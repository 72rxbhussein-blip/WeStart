<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WeStars Full System 2026</title>
    <style>
        :root {
            --bg-color: #ffffff;
            --page-bg: #f1f2f6;
            --text-color: #1a1a1a;
            --nav-bg: #ffffff;
            --accent-color: #00d2ff;
            --inactive-color: #a0a0a0;
            --border-color: #e0e0e0;
            --card-bg: #ffffff;
            --input-bg: #f1f2f6;
            --danger-color: #ff4757;
        }

        [data-theme="dark"] {
            --bg-color: #0b0b0b;
            --page-bg: #000000;
            --text-color: #ffffff;
            --nav-bg: #0f0f0f;
            --accent-color: #00d2ff;
            --inactive-color: #666666;
            --border-color: #1f1f1f;
            --card-bg: #121212;
            --input-bg: #1c1c1c;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--page-bg); color: var(--text-color); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        /* --- Header --- */
        .top-nav { display: flex; justify-content: center; align-items: center; gap: 30px; background: var(--nav-bg); height: 55px; border-bottom: 1px solid var(--border-color); position: sticky; top: 0; z-index: 100; }
        .tab { font-weight: bold; color: var(--inactive-color); cursor: pointer; padding: 10px; position: relative; font-size: 0.95rem; }
        .tab.active { color: var(--text-color); }
        .tab.active::after { content: ''; position: absolute; bottom: 0; left: 20%; width: 60%; height: 3px; background: var(--accent-color); border-radius: 10px; }

        .content { flex: 1; position: relative; overflow: hidden; }
        .page { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: none; overflow-y: auto; padding-bottom: 80px; }
        .page.active { display: block; }

        /* --- Publish Box --- */
        .publish-container { background: var(--card-bg); margin: 15px; border-radius: 20px; padding: 15px; border: 1px solid var(--border-color); }
        .pub-header { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
        .pub-avatar { width: 45px; height: 45px; border-radius: 50%; background-size: cover; border: 2px solid var(--accent-color); background-color: #eee; }
        .pub-meta { flex: 1; position: relative; }
        .pub-name { font-weight: bold; font-size: 0.9rem; }
        
        .privacy-pill { display: inline-flex; align-items: center; background: var(--input-bg); color: var(--inactive-color); padding: 4px 10px; border-radius: 10px; font-size: 0.75rem; margin-top: 3px; cursor: pointer; border: 1px solid var(--border-color); }

        .mini-dropdown { position: absolute; top: 40px; right: 0; background: var(--card-bg); border: 1px solid var(--border-color); border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.2); z-index: 500; display: none; min-width: 100px; }
        .mini-item { padding: 10px; font-size: 0.85rem; text-align: center; border-bottom: 1px solid var(--border-color); cursor: pointer; }
        .mini-item:last-child { border-bottom: none; }

        .pub-input-area { background: var(--input-bg); border-radius: 15px; padding: 12px; margin-bottom: 12px; }
        .pub-textarea { width: 100%; background: transparent; border: none; outline: none; color: var(--text-color); font-size: 0.9rem; resize: none; min-height: 50px; text-align: right; }
        
        .pub-footer { display: flex; justify-content: space-between; align-items: center; }
        .pub-btn { background: var(--accent-color); border: none; padding: 8px 20px; border-radius: 12px; color: #fff; font-weight: bold; cursor: pointer; }

        /* --- Posts Feed --- */
        .post { background: var(--card-bg); margin-bottom: 10px; padding: 15px; border-bottom: 1px solid var(--border-color); position: relative; }
        .post-header { display: flex; justify-content: space-between; margin-bottom: 10px; }
        .u-info { display: flex; align-items: center; gap: 10px; }
        .u-pic { width: 42px; height: 42px; border-radius: 50%; background-size: cover; border: 1px solid var(--border-color); }
        .u-name { font-weight: bold; font-size: 0.9rem; }
        .u-id { color: var(--inactive-color); font-size: 0.75rem; }
        .post-content { font-size: 0.95rem; line-height: 1.5; margin-bottom: 10px; text-align: right; white-space: pre-wrap; }
        .post-img { width: 100%; max-height: 300px; object-fit: cover; border-radius: 12px; margin-top: 5px; cursor: pointer; border: 1px solid var(--border-color); display: block; }

        .post-actions { display: flex; gap: 20px; margin-top: 12px; padding-top: 10px; border-top: 1px solid var(--border-color); }
        .act-btn { display: flex; align-items: center; gap: 5px; cursor: pointer; color: var(--inactive-color); font-size: 0.85rem; }
        .act-btn.active-like { color: var(--danger-color); font-weight: bold; }
        .act-btn svg { width: 18px; height: 18px; }

        /* --- Custom Delete Dialog --- */
        .modal-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.6); z-index:9000; display:none; align-items:center; justify-content:center; }
        .custom-dialog { background: var(--card-bg); width: 85%; max-width: 320px; border-radius: 24px; padding: 25px; text-align: center; border: 1px solid var(--border-color); transform: scale(0.9); transition: 0.2s; }
        .modal-overlay.show .custom-dialog { transform: scale(1); }
        .dialog-title { font-weight: bold; font-size: 1.1rem; margin-bottom: 10px; }
        .dialog-msg { color: var(--inactive-color); font-size: 0.9rem; margin-bottom: 25px; line-height: 1.4; }
        .dialog-btns { display: flex; gap: 12px; }
        .d-btn { flex: 1; padding: 12px; border-radius: 14px; border: none; font-weight: bold; cursor: pointer; font-size: 0.95rem; }
        .d-btn-cancel { background: var(--input-bg); color: var(--text-color); }
        .d-btn-confirm { background: var(--danger-color); color: #fff; }

        /* --- Profile Section --- */
        .profile-top { background: var(--card-bg); border-bottom: 1px solid var(--border-color); padding-bottom: 20px; }
        .banner { width: 100%; height: 160px; background: #333; background-size: cover; background-position: center; position: relative; }
        .avatar-wrap { width: 100px; height: 100px; margin: -50px auto 10px; position: relative; z-index: 5; }
        .avatar-main { width: 100%; height: 100%; border-radius: 50%; border: 4px solid var(--bg-color); background-size: cover; background-color: #eee; }
        
        .list-section { margin-top: 12px; }
        .list-item { display: flex; align-items: center; padding: 18px; background: var(--card-bg); border-bottom: 1px solid var(--border-color); cursor: pointer; }
        .list-item span { flex: 1; font-weight: 500; font-size: 0.95rem; }

        /* --- Bottom Sheet & Overlay --- */
        .bottom-sheet { position: fixed; bottom: -100%; left: 0; width: 100%; background: var(--card-bg); z-index: 2500; border-radius: 25px 25px 0 0; padding: 20px; transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); box-shadow: 0 -5px 25px rgba(0,0,0,0.3); }
        .bottom-sheet.show { bottom: 0; }
        .sheet-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 2400; display: none; }

        .bottom-nav { position: fixed; bottom: 0; left: 0; width: 100%; height: 65px; background: var(--nav-bg); border-top: 1px solid var(--border-color); display: flex; z-index: 1000; }
        .nav-btn { flex: 1; display: flex; justify-content: center; align-items: center; cursor: pointer; }
        .nav-btn svg { width: 26px; height: 26px; stroke: var(--inactive-color); stroke-width: 2; fill: none; }
        .nav-btn.active svg { stroke: var(--accent-color); }

        .styled-input { width: 100%; padding: 14px; border-radius: 14px; border: 1px solid var(--border-color); background: var(--input-bg); color: var(--text-color); margin-bottom: 15px; outline: none; }
        
        #lb { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 5000; display: none; align-items: center; justify-content: center; }
        #lb img { max-width: 95%; max-height: 85%; border-radius: 5px; }

        .post-menu { position: absolute; left: 15px; background: var(--card-bg); border: 1px solid var(--border-color); border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.2); z-index: 600; display: none; min-width: 120px; overflow: hidden; }
        .p-menu-item { padding: 12px; font-size: 0.85rem; text-align: center; border-bottom: 1px solid var(--border-color); cursor: pointer; }
        
        #editImgArea { position: relative; width: 80px; height: 80px; margin-bottom: 15px; }
        .remove-btn-mini { position: absolute; top: -8px; left: -8px; background: var(--danger-color); color: #fff; border-radius: 50%; width: 22px; height: 22px; text-align: center; line-height: 20px; cursor: pointer; font-size: 14px; font-weight: bold; border: 2px solid var(--card-bg); z-index: 10; }
    </style>
</head>
<body onclick="closeAll()">

    <header class="top-nav" id="topNav">
        <div class="tab" id="t-ana" onclick="setTab('ana', this)">أنا</div>
        <div class="tab" id="t-friends" onclick="setTab('friends', this)">الأصدقاء</div>
        <div class="tab active" id="t-general" onclick="setTab('general', this)">عام</div>
    </header>

    <div id="deleteModal" class="modal-overlay">
        <div class="custom-dialog">
            <div class="dialog-title">حذف المنشور؟</div>
            <div class="dialog-msg">هل أنت متأكد من رغبتك في حذف هذا المنشور؟ لا يمكن التراجع عن هذا الإجراء.</div>
            <div class="dialog-btns">
                <button class="d-btn d-btn-cancel" onclick="closeDelModal()">إلغاء</button>
                <button class="d-btn d-btn-confirm" id="confirmDelBtn">حذف</button>
            </div>
        </div>
    </div>

    <main class="content">
        <section id="page-feed" class="page active">
            <div id="pub-box" class="publish-container" style="display:none;">
                <div class="pub-header">
                    <div class="pub-avatar" id="myMiniPic"></div>
                    <div class="pub-meta">
                        <div class="pub-name" id="myPubName">WeStars</div>
                        <div class="privacy-pill" onclick="toggleMiniDrop(event, 'post')">
                            <span id="postPrivacyLabel">عام</span>
                        </div>
                        <div id="drop-post" class="mini-dropdown">
                            <div class="mini-item" onclick="selectPrivacy('عام')">عام</div>
                            <div class="mini-item" onclick="selectPrivacy('الأصدقاء')">الأصدقاء</div>
                            <div class="mini-item" onclick="selectPrivacy('خاص')">خاص</div>
                        </div>
                    </div>
                </div>
                <div class="pub-input-area">
                    <textarea id="postInput" class="pub-textarea" placeholder="اكتب شيئاً..."></textarea>
                    <div id="postImgPrev" style="display:none; margin-top:10px; position:relative;">
                        <img id="imgPrevSrc" style="width:100%; border-radius:10px; max-height:200px; object-fit:cover;">
                        <span onclick="removeImg('post')" style="position:absolute; top:5px; right:5px; background:rgba(0,0,0,0.6); color:#fff; border-radius:50%; width:25px; height:25px; text-align:center; cursor:pointer;">×</span>
                    </div>
                </div>
                <div class="pub-footer">
                    <label style="cursor:pointer;"><svg viewBox="0 0 24 24" width="26" height="26" fill="none" stroke="#00d2ff" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><polyline points="21 15 16 10 5 21"></polyline></svg><input type="file" hidden accept="image/*" onchange="handleFile(this, 'post')"></label>
                    <button class="pub-btn" onclick="addPost()">نشر</button>
                </div>
            </div>
            <div id="feedContent"></div>
        </section>

        <section id="page-profile" class="page">
            <div class="profile-top">
                <div class="banner" id="pBanner">
                    <div onclick="goPage('edit-profile')" style="position:absolute; top:15px; left:15px; background:rgba(0,0,0,0.3); padding:8px; border-radius:50%; cursor:pointer;"><svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="white" stroke-width="2.5"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg></div>
                </div>
                <div class="avatar-wrap"><div class="avatar-main" id="pAvatar"></div></div>
                <div style="text-align:center;">
                    <h2 id="pNameShow">WeStars</h2>
                    <p id="pIdShow" style="color:var(--inactive-color); font-size:0.85rem;">@User</p>
                </div>
            </div>
            <div class="list-section">
                <div class="list-item" onclick="goPage('settings')"><span>الإعدادات</span><svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18l6-6-6-6"></path></svg></div>
                <div class="list-item"><span>القائمة السوداء</span><svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18l6-6-6-6"></path></svg></div>
            </div>
        </section>

        <section id="page-edit-profile" class="page">
            <div style="padding:15px; display:flex; align-items:center; background:var(--nav-bg); border-bottom:1px solid var(--border-color);">
                <div onclick="goPage('profile')" style="margin-left:15px; cursor:pointer;"><svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 12H5M12 19l-7-7 7-7"></path></svg></div>
                <h3 style="flex:1;">تعديل المعلومات</h3>
                <button onclick="saveProfile()" style="color:var(--accent-color); background:none; border:none; font-weight:bold;">حفظ</button>
            </div>
            <div style="padding:20px;">
                <div id="eBannerPrev" style="height:140px; border-radius:15px; background-size:cover; margin-bottom:15px; position:relative; background-color:#333;">
                    <label style="position:absolute; bottom:10px; right:10px; background:rgba(0,0,0,0.5); color:#fff; padding:5px 10px; border-radius:10px; font-size:0.75rem; cursor:pointer;">تغيير الغلاف<input type="file" hidden onchange="prevImg(this, 'eBannerPrev')"></label>
                </div>
                <div id="eAvatarPrev" style="width:90px; height:90px; border-radius:50%; background-size:cover; margin:0 auto 20px; border:3px solid var(--accent-color); position:relative; background-color:#eee;">
                    <label style="position:absolute; bottom:0; right:0; background:var(--accent-color); width:28px; height:28px; border-radius:50%; display:flex; align-items:center; justify-content:center; cursor:pointer; border:2px solid var(--bg-color);"><svg viewBox="0 0 24 24" width="16" height="16" fill="white"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"></path><circle cx="12" cy="13" r="4"></circle></svg><input type="file" hidden onchange="prevImg(this, 'eAvatarPrev')"></label>
                </div>
                <input type="text" id="inName" class="styled-input" placeholder="الاسم" maxlength="14">
                <input type="text" id="inID" class="styled-input" placeholder="المعرف" maxlength="15" oninput="this.value=this.value.replace(/[^a-zA-Z0-9]/g,'')">
            </div>
        </section>

        <section id="page-settings" class="page">
            <div style="padding:15px; display:flex; align-items:center; background:var(--nav-bg); border-bottom:1px solid var(--border-color);">
                <div onclick="goPage('profile')" style="margin-left:15px; cursor:pointer;"><svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 12H5M12 19l-7-7 7-7"></path></svg></div>
                <h3>الإعدادات</h3>
            </div>
            <div style="padding:20px; display:flex; justify-content:space-between; align-items:center; background:var(--card-bg); margin-top:10px;">
                <span>الوضع الليلي</span>
                <input type="checkbox" id="darkToggle" style="width:20px; height:20px;" onchange="toggleDark()">
            </div>
        </section>
    </main>

    <div id="editOverlay" class="sheet-overlay" onclick="closeSheet()"></div>
    <div id="editSheet" class="bottom-sheet">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
            <button onclick="closeSheet()" style="background:none; border:none; color:var(--inactive-color);">إلغاء</button>
            <span style="font-weight:bold;">تعديل المنشور</span>
            <button onclick="saveEdit()" style="background:none; border:none; color:var(--accent-color); font-weight:bold;">تحديث</button>
        </div>
        <div id="editImgArea" style="display:none;">
            <span class="remove-btn-mini" onclick="removeImg('edit')">×</span>
            <img id="editImgThumb" style="width:100%; height:100%; border-radius:10px; object-fit:cover; border:1px solid var(--border-color);">
        </div>
        <textarea id="editInput" class="styled-input" style="height:100px; resize:none;"></textarea>
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <label style="cursor:pointer;"><svg viewBox="0 0 24 24" width="28" height="28" fill="none" stroke="#4caf50" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><polyline points="21 15 16 10 5 21"></polyline></svg><input type="file" hidden onchange="handleFile(this, 'edit')"></label>
            <div class="privacy-pill" onclick="toggleMiniDrop(event, 'edit')">النطاق: <span id="editPrivacyLabel" style="margin-right:5px; font-weight:bold;">عام</span></div>
            <div id="drop-edit" class="mini-dropdown" style="bottom: 50px; top:auto;">
                <div class="mini-item" onclick="selectPrivacy('عام')">عام</div>
                <div class="mini-item" onclick="selectPrivacy('الأصدقاء')">الأصدقاء</div>
                <div class="mini-item" onclick="selectPrivacy('خاص')">خاص</div>
            </div>
        </div>
    </div>

    <div id="lb" onclick="this.style.display='none'"><img id="lbImg"></div>

    <nav class="bottom-nav">
        <div class="nav-btn active" id="b-feed" onclick="goPage('feed', this)"><svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path></svg></div>
        <div class="nav-btn"><svg viewBox="0 0 24 24"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"></path></svg></div>
        <div class="nav-btn" id="b-profile" onclick="goPage('profile', this)"><svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg></div>
    </nav>

    <script>
        let posts = JSON.parse(localStorage.getItem('ws_posts_final')) || [];
        let curImg = '', curEditImg = '', activeId = null, dropTarget = 'post';

        function init() {
            if(!localStorage.getItem('ws_id')) {
                localStorage.setItem('ws_name', 'WeStars');
                localStorage.setItem('ws_id', 'User' + Math.floor(1000 + Math.random() * 9000));
            }
            load();
        }

        function load() {
            const n = localStorage.getItem('ws_name'), i = localStorage.getItem('ws_id'), av = localStorage.getItem('ws_av'), bn = localStorage.getItem('ws_bn'), th = localStorage.getItem('ws_th');
            document.getElementById('pNameShow').innerText = document.getElementById('myPubName').innerText = n;
            document.getElementById('pIdShow').innerText = '@' + i;
            document.getElementById('inName').value = n; document.getElementById('inID').value = i;
            if(av) {
                const url = `url(${av})`;
                document.getElementById('pAvatar').style.backgroundImage = document.getElementById('myMiniPic').style.backgroundImage = document.getElementById('eAvatarPrev').style.backgroundImage = url;
            }
            if(bn) document.getElementById('pBanner').style.backgroundImage = document.getElementById('eBannerPrev').style.backgroundImage = `url(${bn})`;
            if(th === 'dark') { document.documentElement.setAttribute('data-theme', 'dark'); document.getElementById('darkToggle').checked = true; }
            render('general');
        }

        function toggleMiniDrop(e, target) {
            e.stopPropagation();
            closeAll();
            dropTarget = target;
            document.getElementById('drop-' + target).style.display = 'block';
        }

        function selectPrivacy(v) {
            if(dropTarget === 'post') document.getElementById('postPrivacyLabel').innerText = v;
            else document.getElementById('editPrivacyLabel').innerText = v;
            closeAll();
        }

        function handleFile(input, mode) {
            if(input.files && input.files[0]) {
                const r = new FileReader();
                r.onload = e => {
                    if(mode === 'post') { curImg = e.target.result; document.getElementById('imgPrevSrc').src = curImg; document.getElementById('postImgPrev').style.display = 'block'; }
                    else { curEditImg = e.target.result; document.getElementById('editImgThumb').src = curEditImg; document.getElementById('editImgArea').style.display = 'block'; }
                };
                r.readAsDataURL(input.files[0]);
            }
        }

        function removeImg(mode) {
            if(mode === 'post') { curImg = ''; document.getElementById('postImgPrev').style.display = 'none'; }
            else { curEditImg = ''; document.getElementById('editImgArea').style.display = 'none'; }
        }

        function getFormatDate() {
            const d = new Date();
            let hours = d.getHours();
            const ampm = hours >= 12 ? 'م' : 'ص';
            hours = hours % 12;
            hours = hours ? hours : 12; 
            const minutes = d.getMinutes() < 10 ? '0' + d.getMinutes() : d.getMinutes();
            const timeStr = hours + ":" + minutes + " " + ampm;
            const dateStr = d.getFullYear() + ":" + (d.getMonth() + 1) + ":" + d.getDate();
            return timeStr + " " + dateStr;
        }

        function addPost() {
            const txt = document.getElementById('postInput').value.trim();
            if(!txt && !curImg) return;
            const p = {
                id: Date.now(), uName: localStorage.getItem('ws_name'), uId: localStorage.getItem('ws_id'), uPic: localStorage.getItem('ws_av')||'',
                body: txt, img: curImg, privacy: document.getElementById('postPrivacyLabel').innerText, date: getFormatDate(), likes: []
            };
            posts.unshift(p); 
            localStorage.setItem('ws_posts_final', JSON.stringify(posts));
            document.getElementById('postInput').value = ''; 
            removeImg('post'); 
            const curTab = document.querySelector('.tab.active').id.includes('ana') ? 'ana' : (document.querySelector('.tab.active').id.includes('friends') ? 'friends' : 'general');
            render(curTab);
        }

        function render(f) {
            const box = document.getElementById('feedContent'); box.innerHTML = '';
            const myId = localStorage.getItem('ws_id');
            const filtered = posts.filter(p => f === 'ana' ? p.uId === myId : (f === 'friends' ? p.privacy !== 'خاص' : p.privacy === 'عام'));
            
            filtered.forEach(p => {
                const isLiked = p.likes && p.likes.includes(myId);
                box.innerHTML += `
                    <div class="post">
                        <div class="post-header">
                            <div class="u-info">
                                <div class="u-pic" style="background-image:url(${p.uPic})"></div>
                                <div><div class="u-name">${p.uName}</div><div class="u-id">@${p.uId}</div></div>
                            </div>
                            ${p.uId === myId ? `<div style="cursor:pointer; color:var(--inactive-color)" onclick="openMenu(event, ${p.id})">•••</div>
                            <div class="post-menu" id="m-${p.id}">
                                <div class="p-menu-item" onclick="openEdit(${p.id})">تعديل</div>
                                <div class="p-menu-item" style="color:var(--danger-color)" onclick="confirmDelete(${p.id})">حذف</div>
                            </div>` : ''}
                        </div>
                        <div class="post-content">${p.body}</div>
                        ${p.img ? `<img src="${p.img}" class="post-img" onclick="openLB('${p.img}')">` : ''}
                        <div class="post-actions">
                            <div class="act-btn ${isLiked ? 'active-like' : ''}" onclick="like(${p.id})">
                                <svg fill="${isLiked ? 'currentColor' : 'none'}" stroke="currentColor" viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l8.78-8.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path></svg>
                                <span>${p.likes ? p.likes.length : 0}</span>
                            </div>
                            <div class="act-btn">
                                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"></path></svg>
                                <span>0</span>
                            </div>
                            <div style="flex:1; text-align:left; font-size:0.7rem; color:var(--inactive-color);">${p.date}</div>
                        </div>
                    </div>
                `;
            });
        }

        // --- وظائف الحذف الاحترافية الجديدة ---
        function confirmDelete(id) {
            closeAll();
            const modal = document.getElementById('deleteModal');
            modal.style.display = 'flex';
            setTimeout(() => modal.classList.add('show'), 10);
            document.getElementById('confirmDelBtn').onclick = () => {
                posts = posts.filter(x => x.id !== id);
                localStorage.setItem('ws_posts_final', JSON.stringify(posts));
                closeDelModal();
                render(document.querySelector('.tab.active').id.includes('ana') ? 'ana' : 'general');
            };
        }

        function closeDelModal() {
            const modal = document.getElementById('deleteModal');
            modal.classList.remove('show');
            setTimeout(() => modal.style.display = 'none', 200);
        }

        function openMenu(e, id) { e.stopPropagation(); closeAll(); document.getElementById('m-'+id).style.display = 'block'; }
        
        function openEdit(id) {
            activeId = id; const p = posts.find(x => x.id === id);
            document.getElementById('editInput').value = p.body;
            document.getElementById('editPrivacyLabel').innerText = p.privacy;
            curEditImg = p.img;
            if(curEditImg) { document.getElementById('editImgThumb').src = curEditImg; document.getElementById('editImgArea').style.display = 'block'; }
            else { document.getElementById('editImgArea').style.display = 'none'; }
            document.getElementById('editSheet').classList.add('show');
            document.getElementById('editOverlay').style.display = 'block';
        }

        function saveEdit() {
            const p = posts.find(x => x.id === activeId);
            p.body = document.getElementById('editInput').value;
            p.img = curEditImg; p.privacy = document.getElementById('editPrivacyLabel').innerText;
            localStorage.setItem('ws_posts_final', JSON.stringify(posts));
            closeSheet(); 
            const curTab = document.querySelector('.tab.active').id.includes('ana') ? 'ana' : (document.querySelector('.tab.active').id.includes('friends') ? 'friends' : 'general');
            render(curTab);
        }

        function closeSheet() { document.getElementById('editSheet').classList.remove('show'); document.getElementById('editOverlay').style.display = 'none'; }
        
        function closeAll() { document.querySelectorAll('.post-menu, .mini-dropdown').forEach(m => m.style.display = 'none'); }

        function goPage(id, el) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById('page-'+id).classList.add('active');
            document.getElementById('topNav').style.display = (id === 'feed' ? 'flex' : 'none');
            if(el) { document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active')); el.classList.add('active'); }
        }

        function prevImg(input, target) {
            if(input.files && input.files[0]) {
                const r = new FileReader(); r.onload = e => document.getElementById(target).style.backgroundImage = `url(${e.target.result})`; r.readAsDataURL(input.files[0]);
            }
        }

        function saveProfile() {
            const n = document.getElementById('inName').value.trim(), i = document.getElementById('inID').value.trim();
            const av = document.getElementById('eAvatarPrev').style.backgroundImage, bn = document.getElementById('eBannerPrev').style.backgroundImage;
            if(!n || !i) return;
            localStorage.setItem('ws_name', n); localStorage.setItem('ws_id', i);
            if(av && av!=='none') localStorage.setItem('ws_av', av.replace(/url\(["']?|["']?\)$/g, ""));
            if(bn && bn!=='none') localStorage.setItem('ws_bn', bn.replace(/url\(["']?|["']?\)$/g, ""));
            load(); goPage('profile');
        }

        function toggleDark() {
            const d = document.getElementById('darkToggle').checked;
            document.documentElement.setAttribute('data-theme', d ? 'dark' : 'light');
            localStorage.setItem('ws_th', d ? 'dark' : 'light');
        }

        function setTab(f, el) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active')); el.classList.add('active');
            document.getElementById('pub-box').style.display = (f === 'ana' ? 'block' : 'none'); render(f);
        }

        function openLB(s) { document.getElementById('lbImg').src = s; document.getElementById('lb').style.display = 'flex'; }

        function like(id) {
            const myId = localStorage.getItem('ws_id'), p = posts.find(x => x.id === id);
            if(!p.likes) p.likes = [];
            const idx = p.likes.indexOf(myId); if(idx > -1) p.likes.splice(idx,1); else p.likes.push(myId);
            localStorage.setItem('ws_posts_final', JSON.stringify(posts));
            const curTab = document.querySelector('.tab.active').id.includes('ana') ? 'ana' : (document.querySelector('.tab.active').id.includes('friends') ? 'friends' : 'general');
            render(curTab);
        }

        init();
    </script>
</body>
</html>
