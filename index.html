<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>WeStars Ultimate Elite 2026</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-storage-compat.js"></script>

    <style>
        :root {
            --bg-color: #ffffff;
            --page-bg: #f1f2f6;
            --text-color: #1a1a1a;
            --nav-bg: #ffffff;
            --accent-color: #00d2ff;
            --inactive-color: #a0a0a0;
            --border-color: #e0e0e0;
            --card-bg: #ffffff;
            --input-bg: #f1f2f6;
            --danger-color: #ff4757;
            --chat-bubble-me: #00d2ff;
            --chat-bubble-other: #f1f2f6;
            --reply-bg: rgba(0, 210, 255, 0.1);
        }

        [data-theme="dark"] {
            --bg-color: #0b0b0b;
            --page-bg: #000000;
            --text-color: #ffffff;
            --nav-bg: #0f0f0f;
            --accent-color: #00d2ff;
            --inactive-color: #666666;
            --border-color: #1f1f1f;
            --card-bg: #121212;
            --input-bg: #1c1c1c;
            --chat-bubble-other: #1c1c1c;
            --reply-bg: rgba(255, 255, 255, 0.05);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'IBM Plex Sans Arabic', -apple-system, sans-serif; -webkit-tap-highlight-color: transparent; }
        html, body { height: 100%; width: 100%; overflow: hidden; position: fixed; background-color: var(--page-bg); color: var(--text-color); transition: 0.3s; }
        
        /* شاشة تسجيل الدخول الاحترافية */
        #auth-screen {
            position: fixed; inset: 0; background: var(--bg-color); z-index: 10000;
            display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 30px; text-align: center;
        }
        .auth-logo { width: 120px; height: 120px; background: var(--accent-color); border-radius: 35px; margin-bottom: 20px; display: flex; align-items: center; justify-content: center; box-shadow: 0 20px 40px rgba(0,210,255,0.3); transform: rotate(-10deg); }
        .google-btn {
            background: #ffffff; color: #000; border: 1px solid #ddd; padding: 12px 25px; border-radius: 15px;
            display: flex; align-items: center; gap: 12px; font-weight: bold; cursor: pointer; transition: 0.3s; box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        .google-btn:active { transform: scale(0.95); }

        .content { flex: 1; position: relative; overflow: hidden; height: 100%; display: none; }
        .page { position: absolute; inset: 0; display: none; overflow-y: auto; padding-bottom: 90px; -webkit-overflow-scrolling: touch; }
        .page.active { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* التنسيقات العامة */
        .msg-header { padding: 40px 20px 10px; background: var(--nav-bg); display: flex; justify-content: space-between; align-items: center; }
        .msg-header-title { font-weight: 900; font-size: 1.8rem; letter-spacing: -1px; }
        .header-actions { display: flex; gap: 12px; }
        .action-btn { width: 45px; height: 45px; border-radius: 15px; background: var(--input-bg); display: flex; align-items: center; justify-content: center; cursor: pointer; color: var(--accent-color); position: relative; }
        .dot-notify { position: absolute; top: 12px; right: 12px; width: 10px; height: 10px; background: var(--danger-color); border-radius: 50%; border: 2px solid var(--nav-bg); display: none; }

        .search-area { padding: 10px 15px 15px; background: var(--nav-bg); border-bottom: 1px solid var(--border-color); sticky; top: 0; z-index: 100; }
        .styled-input { width: 100%; padding: 14px; border-radius: 16px; border: 1.5px solid var(--border-color); background: var(--input-bg); color: var(--text-color); outline: none; transition: 0.2s; }
        .styled-input:focus { border-color: var(--accent-color); }

        .msg-list-item { display: flex; align-items: center; padding: 18px 15px; background: var(--card-bg); border-bottom: 1px solid var(--border-color); cursor: pointer; }
        .msg-avatar { width: 58px; height: 58px; border-radius: 50%; background-size: cover; border: 2px solid var(--accent-color); margin-left: 15px; position: relative; background-position: center; background-color: #eee; }
        .unread-badge { position: absolute; top: 18px; right: 20px; background: var(--danger-color); color: white; min-width: 22px; height: 22px; border-radius: 11px; font-size: 0.75rem; display: none; align-items: center; justify-content: center; font-weight: bold; border: 2px solid var(--card-bg); }

        /* نافذة الدردشة */
        #chat-window { position: fixed; inset: 0; background: var(--bg-color); z-index: 3000; display: none; flex-direction: column; }
        .chat-header { height: 85px; background: var(--nav-bg); border-bottom: 1px solid var(--border-color); display: flex; align-items: center; padding: 25px 15px 0; }
        .chat-body { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 18px; }
        .chat-footer { padding: 12px 15px env(safe-area-inset-bottom, 20px); background: var(--nav-bg); border-top: 1px solid var(--border-color); display: flex; flex-direction: column; gap: 8px; }

        .user-status-text { font-size: 0.75rem; color: var(--inactive-color); }
        .status-online { color: #2ecc71; font-weight: bold; }
        .typing-indicator { color: var(--accent-color); font-style: italic; font-size: 0.75rem; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }

        /* فقاعات الرسائل */
        .bubble-container { position: relative; width: 100%; display: flex; flex-direction: column; transition: 0.1s linear; touch-action: pan-y; }
        .bubble { max-width: 82%; padding: 12px 16px; border-radius: 20px; font-size: 0.98rem; position: relative; line-height: 1.4; }
        .bubble.me { background: var(--chat-bubble-me); color: #fff; border-top-right-radius: 4px; align-self: flex-start; text-align: right; }
        .bubble.other { background: var(--chat-bubble-other); color: var(--text-color); border-top-left-radius: 4px; align-self: flex-end; text-align: left; }
        .bubble-time { font-size: 0.65rem; opacity: 0.7; margin-top: 6px; display: block; direction: ltr; }

        /* ميزات الرد والتعديل */
        #edit-indicator, #reply-indicator { display: none; background: var(--input-bg); padding: 10px 15px; border-radius: 15px; border-right: 4px solid var(--accent-color); align-items: center; justify-content: space-between; animation: slideUp 0.3s; }
        .replied-msg-box { background: rgba(0,0,0,0.05); border-right: 3px solid var(--accent-color); padding: 6px 12px; border-radius: 10px; margin-bottom: 8px; font-size: 0.85rem; }

        /* البروفايل */
        .banner { width: 100%; height: 180px; background: #222; background-size: cover; background-position: center; position: relative; }
        .avatar-main { width: 120px; height: 120px; border-radius: 50%; border: 6px solid var(--bg-color); background-size: cover; margin: -60px auto 15px; position: relative; background-color: #eee; background-position: center; }

        /* التنقل السفلي */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; height: 75px; background: var(--nav-bg); border-top: 1px solid var(--border-color); display: flex; z-index: 1000; padding-bottom: env(safe-area-inset-bottom); }
        .nav-btn { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 4px; opacity: 0.5; transition: 0.3s; }
        .nav-btn.active { opacity: 1; color: var(--accent-color); }

        /* النوافذ المنبثقة */
        .custom-popup { position: fixed; background: var(--card-bg); border-radius: 20px; box-shadow: 0 15px 40px rgba(0,0,0,0.2); z-index: 9000; display: none; min-width: 200px; overflow: hidden; animation: popIn 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275); border: 1px solid var(--border-color); }
        @keyframes popIn { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        .popup-btn { padding: 16px; text-align: center; border-bottom: 1px solid var(--border-color); cursor: pointer; font-weight: 600; color: var(--text-color); }
        .popup-btn:active { background: var(--input-bg); }

        /* التحميل (Loading) */
        #loading-overlay { position: fixed; inset: 0; background: var(--bg-color); z-index: 20000; display: flex; align-items: center; justify-content: center; }
        .spinner { width: 40px; height: 40px; border: 4px solid var(--input-bg); border-top-color: var(--accent-color); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        .toast { position: fixed; top: 30px; left: 50%; transform: translateX(-50%); background: var(--danger-color); color: white; padding: 12px 25px; border-radius: 30px; z-index: 11000; display: none; box-shadow: 0 10px 20px rgba(0,0,0,0.2); font-weight: bold; }
    </style>
</head>

    <script>
        // --- إعدادات Firebase ---
        const firebaseConfig = {
            apiKey: "AIzaSy...", // استبدلها بمفتاحك الحقيقي
            authDomain: "westart-ac4d2.firebaseapp.com",
            databaseURL: "https://westart-ac4d2-default-rtdb.firebaseio.com/",
            projectId: "westart-ac4d2",
            storageBucket: "westart-ac4d2.appspot.com",
            messagingSenderId: "...",
            appId: "..."
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const auth = firebase.auth();
        const storage = firebase.storage();

        // --- متغيرات الحالة ---
        let userData = { uid: null, name: "WeStars", id: "", avatar: "", banner: "" };
        let myFriends = [];
        let currentFriend = null;
        let selectedMsgId = null, selectedMsgText = "", selectedMsgImg = null, replyToId = null, tempChatImg = null, isEditMode = false;
        let typingTimeout;

        // --- المصادقة (Auth Logic) ---
        auth.onAuthStateChanged(user => {
            document.getElementById('loading-overlay').style.display = 'none';
            if (user) {
                userData.uid = user.uid;
                db.ref('users/' + user.uid).once('value', snap => {
                    if (snap.exists()) {
                        userData = snap.val();
                        initApp();
                    } else {
                        // مستخدم جديد من جوجل
                        userData.name = user.displayName;
                        userData.avatar = user.photoURL;
                        userData.id = "user_" + Math.random().toString(36).substr(2, 5);
                        db.ref('users/' + user.uid).set(userData);
                        initApp();
                    }
                });
            } else {
                document.getElementById('auth-screen').style.display = 'flex';
                document.getElementById('main-content').style.display = 'none';
                document.getElementById('bottom-nav').style.display = 'none';
            }
        });

        function signInWithGoogle() {
            const provider = new firebase.auth.GoogleAuthProvider();
            auth.signInWithRedirect(provider);
        }

        function logout() {
            auth.signOut().then(() => location.reload());
        }

        // --- تشغيل التطبيق ---
        function initApp() {
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('main-content').style.display = 'block';
            document.getElementById('bottom-nav').style.display = 'flex';
            document.body.setAttribute('data-theme', 'dark');
            
            loadProfile();
            setUserPresence();
            listenForMyFriends();
            listenForRequests();
        }

        function setUserPresence() {
            const myStatusRef = db.ref('status/' + userData.uid);
            db.ref('.info/connected').on('value', snap => {
                if (snap.val() === true) {
                    myStatusRef.onDisconnect().set({ state: 'offline', last_changed: firebase.database.ServerValue.TIMESTAMP });
                    myStatusRef.set({ state: 'online', last_changed: firebase.database.ServerValue.TIMESTAMP });
                }
            });
        }

        // --- منطق الأصدقاء والرسائل ---
        function listenForMyFriends() {
            db.ref('friends/' + userData.uid).on('value', snap => {
                myFriends = [];
                const data = snap.val();
                if (data) {
                    Object.keys(data).forEach(key => myFriends.push(data[key]));
                }
                renderFriends();
                startUnreadMonitor();
            });
        }

        function renderFriends() {
            const container = document.getElementById('messages-list');
            container.innerHTML = myFriends.map(f => `
                <div class="msg-list-item" onclick="openChat('${f.uid}')">
                    <div class="msg-avatar" style="background-image:url('${f.avatar || ''}')"></div>
                    <div id="badge-${f.uid}" class="unread-badge">0</div>
                    <div style="flex:1;">
                        <div style="font-weight:900;">${f.name}</div>
                        <div id="last-msg-${f.uid}" style="font-size:0.8rem; color:var(--inactive-color); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:200px;">@${f.id}</div>
                    </div>
                </div>`).join('');
            
            myFriends.forEach(f => {
                const chatID = [userData.uid, f.uid].sort().join('_');
                db.ref('chats/' + chatID).limitToLast(1).on('value', s => {
                    const m = s.val();
                    const el = document.getElementById('last-msg-' + f.uid);
                    if (el && m) {
                        const last = Object.values(m)[0];
                        el.innerText = last.img ? "📷 صورة" : last.text;
                    }
                });
            });
        }

        function openChat(friendUid) {
            currentFriend = myFriends.find(f => f.uid === friendUid);
            document.getElementById('chat-user-name').innerText = currentFriend.name;
            document.getElementById('chat-user-avatar').style.backgroundImage = `url('${currentFriend.avatar || ''}')`;
            document.getElementById('chat-window').style.display = 'flex';
            
            watchFriendStatus(friendUid);
            const chatID = [userData.uid, friendUid].sort().join('_');

            // مراقبة الرسائل (آخر 50)
            db.ref('chats/' + chatID).limitToLast(50).on('value', snap => {
                const msgs = snap.val();
                if (msgs) {
                    Object.keys(msgs).forEach(k => {
                        if (msgs[k].sender !== userData.uid && !msgs[k].seen) db.ref(`chats/${chatID}/${k}`).update({ seen: true });
                    });
                }
                renderMessages(msgs);
            });

            // مراقبة الكتابة
            db.ref(`typing/${chatID}/${friendUid}`).on('value', s => {
                const statusLabel = document.getElementById('chat-user-status');
                if (s.val() === true) {
                    statusLabel.innerHTML = '<span class="typing-indicator">جاري الكتابة الآن...</span>';
                } else {
                    watchFriendStatus(friendUid); // ارجع لحالة آخر ظهور
                }
            });
        }

        function renderMessages(msgs) {
            const container = document.getElementById('chat-body');
            container.innerHTML = '';
            if (!msgs) return;
            Object.keys(msgs).forEach(key => {
                const m = msgs[key];
                if (m.deletedBy === userData.uid) return;
                const isMe = m.sender === userData.uid;
                let replyHtml = "";
                if (m.replyTo && msgs[m.replyTo]) {
                    const original = msgs[m.replyTo];
                    replyHtml = `<div class="replied-msg-box" onclick="scrollToMsg('${m.replyTo}')">
                        <div style="font-weight:bold; color:var(--accent-color);">${original.sender === userData.uid ? 'أنت' : currentFriend.name}</div>
                        <div style="opacity:0.7; font-size:0.8rem;">${original.text || '📷 صورة'}</div>
                    </div>`;
                }

                container.innerHTML += `
                    <div class="bubble-container" id="cont-${key}" ontouchstart="touchStartSwipe(event, '${key}')" ontouchend="touchEndSwipe(event, '${key}', '${m.sender}', '${m.text}')">
                        <div id="msg-${key}" class="bubble ${isMe ? 'me' : 'other'}" oncontextmenu="handleLongPress(event, '${key}', '${m.text || ''}', '${m.img || ''}', '${m.sender}')">
                            ${replyHtml}
                            ${m.img ? `<img src="${m.img}" style="width:100%; border-radius:12px; margin-bottom:8px;" onclick="viewImg('${m.img}')">` : ''}
                            ${m.text || ''}
                            <span class="bubble-time">${m.time} | ${m.date}</span>
                        </div>
                    </div>`;
            });
            container.scrollTop = container.scrollHeight;
        }

        // --- رفع الملفات لـ Firebase Storage ---
        function uploadImageToFirebase(input) {
            if (!input.files[0]) return;
            const file = input.files[0];
            const ref = storage.ref(`chats/${Date.now()}_${file.name}`);
            showToast("جاري رفع الصورة...");
            
            ref.put(file).then(snapshot => snapshot.ref.getDownloadURL()).then(url => {
                tempChatImg = url;
                document.getElementById('chatImgPrevBox').style.display = 'block';
                document.getElementById('chatImgPrevSrc').src = url;
                showToast("تم الرفع بنجاح");
            });
        }

        function uploadToStorage(input, type) {
            if (!input.files[0]) return;
            const file = input.files[0];
            const ref = storage.ref(`users/${userData.uid}/${type}`);
            showToast("جاري التحديث...");
            
            ref.put(file).then(snapshot => snapshot.ref.getDownloadURL()).then(url => {
                if (type === 'avatar') {
                    userData.avatar = url;
                    document.getElementById('eAvatarPrev').style.backgroundImage = `url('${url}')`;
                } else {
                    userData.banner = url;
                    document.getElementById('eBannerPrev').style.backgroundImage = `url('${url}')`;
                }
            });
        }

        // --- إرسال الرسائل ---
        function sendMessage() {
            const inp = document.getElementById('chat-input');
            const text = inp.value.trim();
            if (!text && !tempChatImg) return;
            
            const chatID = [userData.uid, currentFriend.uid].sort().join('_');
            const now = new Date();
            const timeStr = now.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', hour12: true });
            const dateStr = now.toLocaleDateString('en-GB');

            if (isEditMode) {
                db.ref(`chats/${chatID}/${selectedMsgId}`).update({ text, img: tempChatImg });
                cancelEditMode();
            } else {
                const msgData = {
                    sender: userData.uid,
                    text: text,
                    img: tempChatImg || null,
                    time: timeStr,
                    date: dateStr,
                    seen: false
                };
                if (replyToId) msgData.replyTo = replyToId;
                db.ref(`chats/${chatID}`).push(msgData);
                inp.value = '';
                removeChatImg();
                cancelReplyMode();
            }
            // توقف عن حالة الكتابة فور الإرسال
            db.ref(`typing/${chatID}/${userData.uid}`).set(false);
        }

        function updateTypingStatus() {
            const chatID = [userData.uid, currentFriend.uid].sort().join('_');
            db.ref(`typing/${chatID}/${userData.uid}`).set(true);
            clearTimeout(typingTimeout);
            typingTimeout = setTimeout(() => {
                db.ref(`typing/${chatID}/${userData.uid}`).set(false);
            }, 2000);
        }

        // --- وظائف مساعدة (UI) ---
        function goPage(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById('page-' + id).classList.add('active');
            document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active'));
            if(id === 'messages') document.querySelectorAll('.nav-btn')[0].classList.add('active');
            if(id === 'profile') document.querySelectorAll('.nav-btn')[1].classList.add('active');
        }

        function closeChat() {
            document.getElementById('chat-window').style.display = 'none';
            if (currentFriend) {
                const chatID = [userData.uid, currentFriend.uid].sort().join('_');
                db.ref('chats/' + chatID).off();
                db.ref(`typing/${chatID}/${currentFriend.uid}`).off();
                db.ref('status/' + currentFriend.uid).off();
            }
            currentFriend = null;
        }

        function loadProfile() {
            document.getElementById('pNameShow').innerText = userData.name;
            document.getElementById('pIdShow').innerText = "@" + userData.id;
            document.getElementById('pAvatar').style.backgroundImage = `url('${userData.avatar || ''}')`;
            document.getElementById('pBanner').style.backgroundImage = `url('${userData.banner || ''}')`;
            document.getElementById('eName').value = userData.name;
            document.getElementById('eId').value = userData.id;
            document.getElementById('eAvatarPrev').style.backgroundImage = `url('${userData.avatar || ''}')`;
            document.getElementById('eBannerPrev').style.backgroundImage = `url('${userData.banner || ''}')`;
        }

        function saveProfile() {
            const newId = document.getElementById('eId').value.trim();
            const newName = document.getElementById('eName').value.trim();
            if (!newId || !newName) return;
            
            userData.id = newId;
            userData.name = newName;
            db.ref('users/' + userData.uid).update(userData).then(() => {
                showToast("تم حفظ التعديلات");
                loadProfile();
                goPage('profile');
            });
        }

        function watchFriendStatus(friendUid) {
            const label = document.getElementById('chat-user-status');
            db.ref('status/' + friendUid).on('value', snap => {
                const s = snap.val();
                if (!s) return;
                if (s.state === 'online') {
                    label.innerText = "متصل الآن";
                    label.className = "user-status-text status-online";
                } else {
                    label.className = "user-status-text";
                    const last = new Date(s.last_changed);
                    label.innerText = "آخر ظهور: " + last.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });
                }
            });
        }

        function showToast(msg) {
            const t = document.getElementById('toastAlert');
            t.innerText = msg; t.style.display = 'block';
            setTimeout(() => t.style.display = 'none', 3000);
        }

        function closeAllUI() { document.getElementById('msgPopup').style.display = 'none'; }
        function removeChatImg() { tempChatImg = null; document.getElementById('chatImgPrevBox').style.display = 'none'; }
        function viewImg(src) { document.getElementById('lbImg').src = src; document.getElementById('lb').style.display = 'flex'; }
        function toggleTheme() {
            const b = document.body;
            const current = b.getAttribute('data-theme');
            b.setAttribute('data-theme', current === 'dark' ? 'light' : 'dark');
        }

        // --- منطق البحث والطلبات ---
        function searchUserByInternalID() {
            const val = document.getElementById('addSearchInput').value.trim();
            const container = document.getElementById('search-result-container');
            if (!val) return container.innerHTML = "";
            
            db.ref('users').orderByChild('id').equalTo(val).once('value', snap => {
                const data = snap.val();
                if (data) {
                    const u = Object.values(data)[0];
                    const uid = Object.keys(data)[0];
                    if (uid === userData.uid) return;
                    container.innerHTML = `<div class="req-card" style="margin:20px; padding:15px; background:var(--card-bg); border-radius:20px; display:flex; align-items:center; gap:15px; border:1px solid var(--border-color);">
                        <div class="msg-avatar" style="background-image:url('${u.avatar || ''}')"></div>
                        <div style="flex:1;"><b>${u.name}</b><br><small>@${u.id}</small></div>
                        <button onclick="sendFriendRequest('${uid}', '${u.name}', '${u.avatar}')" class="btn-accept" style="background:var(--accent-color); color:white; border:none; padding:10px 20px; border-radius:12px; font-weight:bold;">إرسال طلب</button>
                    </div>`;
                } else {
                    container.innerHTML = "<p style='text-align:center; padding:30px;'>المستخدم غير موجود</p>";
                }
            });
        }

        function sendFriendRequest(toUid, name, avatar) {
            db.ref(`requests/${toUid}/${userData.uid}`).set({
                uid: userData.uid,
                name: userData.name,
                id: userData.id,
                avatar: userData.avatar
            }).then(() => showToast("تم إرسال الطلب"));
        }

        function listenForRequests() {
            db.ref('requests/' + userData.uid).on('value', snap => {
                const reqs = snap.val();
                const list = document.getElementById('requests-list');
                const dot = document.getElementById('requestDot');
                list.innerHTML = "";
                if (reqs) {
                    dot.style.display = 'block';
                    Object.values(reqs).forEach(r => {
                        list.innerHTML += `<div class="req-card" style="margin:15px; padding:15px; background:var(--card-bg); border-radius:18px; display:flex; align-items:center; gap:12px; border:1px solid var(--border-color);">
                            <div class="msg-avatar" style="background-image:url('${r.avatar || ''}')"></div>
                            <div style="flex:1;"><b>${r.name}</b><br>@${r.id}</div>
                            <button onclick="acceptRequest('${r.uid}', '${r.name}', '${r.avatar}', '${r.id}')" style="background:var(--accent-color); color:white; border:none; padding:8px 15px; border-radius:10px; font-weight:bold;">قبول</button>
                        </div>`;
                    });
                } else {
                    dot.style.display = 'none';
                    list.innerHTML = "<p style='text-align:center; padding:40px; opacity:0.5;'>لا توجد طلبات جديدة</p>";
                }
            });
        }

        function acceptRequest(fUid, fName, fAvatar, fId) {
            const fData = { uid: fUid, name: fName, avatar: fAvatar, id: fId };
            // إضافة للصديق عندي
            db.ref(`friends/${userData.uid}/${fUid}`).set(fData);
            // إضافة لي عنده
            db.ref(`friends/${fUid}/${userData.uid}`).set({ uid: userData.uid, name: userData.name, avatar: userData.avatar, id: userData.id });
            // حذف الطلب
            db.ref(`requests/${userData.uid}/${fUid}`).remove();
            showToast("تمت الإضافة بنجاح");
        }

        // --- التعامل مع الرسائل (Long Press & Swipe) ---
        function handleLongPress(e, id, text, img, sender) {
            e.preventDefault();
            selectedMsgId = id; selectedMsgText = text; selectedMsgImg = img;
            const pop = document.getElementById('msgPopup');
            const isMe = sender === userData.uid;
            
            pop.innerHTML = isMe ? 
                `<div class="popup-btn" onclick="enterEditMode()">تعديل</div>
                 <div class="popup-btn" style="color:var(--danger-color)" onclick="deleteMessage('all')">حذف للجميع</div>` :
                `<div class="popup-btn" onclick="deleteMessage('me')">حذف لدي</div>`;
            
            pop.style.display = 'block';
            pop.style.left = '50%';
            pop.style.top = '50%';
            pop.style.transform = 'translate(-50%, -50%)';
        }

        function deleteMessage(type) {
            const chatID = [userData.uid, currentFriend.uid].sort().join('_');
            if (type === 'all') db.ref(`chats/${chatID}/${selectedMsgId}`).remove();
            else db.ref(`chats/${chatID}/${selectedMsgId}`).update({ deletedBy: userData.uid });
            closeAllUI();
        }

        function enterEditMode() {
            isEditMode = true; closeAllUI();
            document.getElementById('edit-indicator').style.display = 'flex';
            document.getElementById('chat-input').value = selectedMsgText;
            document.getElementById('chat-input').focus();
        }

        function cancelEditMode() {
            isEditMode = false;
            document.getElementById('edit-indicator').style.display = 'none';
            document.getElementById('chat-input').value = '';
        }

        let startX = 0;
        function touchStartSwipe(e) { startX = e.touches[0].clientX; }
        function touchEndSwipe(e, id, sender, text) {
            let moveX = e.changedTouches[0].clientX - startX;
            if (Math.abs(moveX) > 70) {
                replyToId = id;
                document.getElementById('reply-indicator').style.display = 'flex';
                document.getElementById('reply-to-name').innerText = sender === userData.uid ? "أنت" : currentFriend.name;
                document.getElementById('reply-to-text').innerText = text || "📷 صورة";
                document.getElementById('chat-input').focus();
            }
        }
        function cancelReplyMode() { replyToId = null; document.getElementById('reply-indicator').style.display = 'none'; }
    </script>
</body>
</html>
