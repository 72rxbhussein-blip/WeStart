<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WeStars - Ultimate Edition</title>
    <style>
        :root {
            --bg-color: #ffffff;
            --page-bg: #f8f9fa;
            --text-color: #1a1a1a;
            --nav-bg: #ffffff;
            --accent-color: #007bff;
            --inactive-color: #a0a0a0;
            --border-color: #eeeeee;
            --banner-gradient: linear-gradient(135deg, #2c3e50 0%, #000000 100%);
            --input-bg: #f1f3f5;
            --card-bg: #ffffff;
        }

        [data-theme="dark"] {
            --bg-color: #0b0b0b;
            --page-bg: #050505;
            --text-color: #ffffff;
            --nav-bg: #0f0f0f;
            --accent-color: #00d2ff;
            --inactive-color: #666666;
            --border-color: #1f1f1f;
            --banner-gradient: linear-gradient(135deg, #1a1a1a 0%, #000000 100%);
            --input-bg: #1a1a1a;
            --card-bg: #121212;
        }

        * {
            margin: 0; padding: 0; box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--page-bg);
            color: var(--text-color);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            transition: all 0.3s ease;
        }

        /* --- الهيدر العلوي (تبويبات تيك توك) --- */
        .top-tabs-nav {
            display: flex; justify-content: center; align-items: center; gap: 25px;
            background: var(--nav-bg); border-bottom: 1px solid var(--border-color);
            height: 55px; position: sticky; top: 0; z-index: 100;
        }
        .tab-item {
            font-size: 1rem; font-weight: 600; color: var(--inactive-color);
            cursor: pointer; position: relative; padding: 5px 0;
        }
        .tab-item.active { color: var(--text-color); }
        .tab-item.active::after {
            content: ''; position: absolute; bottom: -8px; left: 50%;
            transform: translateX(-50%); width: 20px; height: 3px;
            background: var(--accent-color); border-radius: 10px;
        }

        .content-area { flex: 1; position: relative; overflow: hidden; margin-bottom: 65px; }

        .page {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: none; overflow-y: auto; background-color: var(--page-bg);
            padding-bottom: 40px;
        }
        .page.active { display: block; }

        /* --- صندوق النشر الاحترافي --- */
        .publish-card {
            background: var(--card-bg); margin: 15px; border-radius: 20px;
            padding: 15px; border: 1px solid var(--border-color);
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
        }
        .publish-header { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; position: relative; }
        .user-mini-pic { width: 45px; height: 45px; border-radius: 50%; background-size: cover; border: 2px solid var(--accent-color); }
        .privacy-btn { background: var(--input-bg); border-radius: 15px; padding: 5px 12px; cursor: pointer; display: flex; align-items: center; gap: 5px; }
        
        .privacy-menu {
            position: absolute; top: 45px; left: 0; background: var(--card-bg);
            border: 1px solid var(--border-color); border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2); z-index: 1000; display: none; width: 110px;
        }
        .privacy-option { padding: 10px; font-size: 0.85rem; cursor: pointer; text-align: center; border-bottom: 1px solid var(--border-color); color: var(--text-color); }
        .privacy-option:hover { background: var(--accent-color); color: white; }

        .input-box { background: var(--input-bg); border-radius: 15px; padding: 12px; }
        .post-input { width: 100%; background: transparent; border: none; outline: none; color: var(--text-color); font-size: 0.95rem; min-height: 45px; resize: none; text-align: right; }
        
        .img-preview-container { margin-top: 10px; position: relative; display: none; }
        .img-preview-container img { width: 100%; border-radius: 10px; max-height: 200px; object-fit: cover; }
        .remove-img { position: absolute; top: 5px; right: 5px; background: rgba(0,0,0,0.6); color: white; border-radius: 50%; width: 24px; height: 24px; display: flex; align-items: center; justify-content: center; cursor: pointer; }

        .publish-footer { display: flex; justify-content: space-between; align-items: center; margin-top: 10px; }
        .footer-icons { display: flex; gap: 15px; }

        /* --- تصميم بطاقة المنشور المرتبة --- */
        .post-card {
            background: var(--card-bg); border-radius: 20px; border: 1px solid var(--border-color);
            padding: 15px; margin-bottom: 15px; position: relative; display: flex; flex-direction: column;
        }
        .post-top { display: flex; justify-content: space-between; align-items: center; }
        .post-user { display: flex; align-items: center; gap: 10px; }
        .post-pic { width: 42px; height: 42px; border-radius: 50%; background-size: cover; background-color: #eee; border: 1px solid var(--border-color); }
        .post-info { display: flex; flex-direction: column; }
        .post-name { font-weight: 700; font-size: 0.95rem; }
        .post-id { font-size: 0.75rem; color: var(--inactive-color); }
        .post-options { cursor: pointer; color: var(--inactive-color); padding: 5px; }

        .post-body { margin-top: 10px; font-size: 0.95rem; line-height: 1.5; white-space: pre-wrap; text-align: right; width: 100%; }
        .post-img { width: 100%; border-radius: 12px; margin-top: 10px; border: 1px solid var(--border-color); display: block; }

        .post-footer { display: flex; justify-content: space-between; align-items: flex-end; margin-top: 15px; }
        .post-interactions { display: flex; gap: 20px; }
        .inter-item { display: flex; align-items: center; gap: 6px; color: var(--inactive-color); cursor: pointer; font-size: 0.85rem; }
        .inter-item.liked svg { fill: #ff4757; stroke: #ff4757; }
        .inter-item.liked span { color: #ff4757; }
        .post-date { font-size: 0.7rem; color: var(--inactive-color); direction: ltr; margin-bottom: 2px; }

        /* --- الملف الشخصي --- */
        .profile-header { background-color: var(--bg-color); position: relative; padding-bottom: 20px; }
        .profile-banner { width: 100%; height: 180px; background: var(--banner-gradient); position: relative; background-size: cover; background-position: center; }
        .edit-banner-btn { position: absolute; top: 15px; left: 15px; background: rgba(0,0,0,0.3); backdrop-filter: blur(5px); padding: 8px; border-radius: 50%; display: flex; cursor: pointer; border: 1px solid rgba(255, 255, 255, 0.2); }
        .profile-avatar-section { text-align: center; margin-top: -60px; position: relative; z-index: 5; }
        .profile-pic { width: 110px; height: 110px; border-radius: 50%; background-color: var(--bg-color); border: 4px solid var(--bg-color); margin: 0 auto; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 15px rgba(0,0,0,0.1); background-size: cover; background-position: center; }
        .profile-name-display { font-size: 1.4rem; font-weight: 800; margin-top: 10px; }
        .profile-id-display { color: var(--inactive-color); font-size: 0.9rem; }
        
        .menu-list { list-style: none; margin-top: 10px; }
        .menu-item { display: flex; align-items: center; padding: 16px 20px; background: var(--bg-color); border-bottom: 1px solid var(--border-color); cursor: pointer; }
        .menu-icon { margin-left: 15px; color: var(--accent-color); display: flex; }
        .menu-label { flex: 1; font-weight: 500; }

        /* --- واجهة التعديل --- */
        .sub-header { padding: 18px; display: flex; align-items: center; background: var(--bg-color); border-bottom: 1px solid var(--border-color); }
        .back-icon { cursor: pointer; margin-left: 15px; }
        .edit-section { padding: 20px; }
        .edit-group { margin-bottom: 18px; }
        .edit-label { display: block; margin-bottom: 8px; font-size: 0.85rem; color: var(--inactive-color); font-weight: bold; }
        .edit-input { width: 100%; padding: 14px; border-radius: 12px; border: 1px solid var(--border-color); background: var(--input-bg); color: var(--text-color); outline: none; }
        .btn-save { width: 100%; padding: 16px; border-radius: 12px; border: none; background: var(--accent-color); color: white; font-weight: bold; cursor: pointer; }

        /* --- سويتش الوضع الداكن --- */
        .switch { position: relative; display: inline-block; width: 46px; height: 24px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #ccc; transition: .4s; border-radius: 34px; }
        .slider:before { position: absolute; content: ""; height: 18px; width: 18px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: var(--accent-color); }
        input:checked + .slider:before { transform: translateX(22px); }

        .bottom-nav { position: fixed; bottom: 0; left: 0; width: 100%; height: 65px; background-color: var(--nav-bg); border-top: 1px solid var(--border-color); display: flex; z-index: 1000; }
        .nav-item { flex: 1; display: flex; justify-content: center; align-items: center; cursor: pointer; }
        .nav-item svg { width: 26px; height: 26px; fill: none; stroke: var(--inactive-color); stroke-width: 1.8; }
        .nav-item.active svg { stroke: var(--accent-color); transform: scale(1.1); }
    </style>
</head>
<body onload="loadSavedData()">

    <header class="top-tabs-nav" id="mainTopNav">
        <div class="tab-item" onclick="switchFeedTab('ana', this)">أنا</div>
        <div class="tab-item" onclick="switchFeedTab('friends', this)">الأصدقاء</div>
        <div class="tab-item active" onclick="switchFeedTab('general', this)">عام</div>
    </header>

    <main class="content-area">
        <section id="feed" class="page active">
            <div id="ana-publish-zone" style="display: none;">
                <div class="publish-card">
                    <div class="publish-header">
                        <div class="user-mini-pic" id="pubUserPic"></div>
                        <div class="user-mini-info" style="margin-right: 10px;">
                            <div class="user-mini-name" id="pubUserName" style="font-weight:700;">WeStars</div>
                            <div class="privacy-btn" onclick="togglePrivacyMenu()">
                                <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><line x1="2" y1="12" x2="22" y2="12"></line><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"></path></svg>
                                <span id="privacyLabel" style="font-size: 0.75rem;">عام</span>
                                <div class="privacy-menu" id="privacyMenu">
                                    <div class="privacy-option" onclick="setPrivacy('عام')">عام</div>
                                    <div class="privacy-option" onclick="setPrivacy('الاصدقاء')">الأصدقاء</div>
                                    <div class="privacy-option" onclick="setPrivacy('خاص')">خاص</div>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="input-box">
                        <textarea class="post-input" id="postTextInput" placeholder="بماذا تفكر؟" oninput="autoGrow(this)"></textarea>
                        <div class="img-preview-container" id="postImgPreviewZone">
                            <span class="remove-img" onclick="removeSelectedImg()">×</span>
                            <img id="postImgPreview" src="">
                        </div>
                    </div>
                    <div class="publish-footer">
                        <div class="footer-icons">
                            <label class="icon-btn" style="cursor: pointer;">
                                <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="#28a745" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><polyline points="21 15 16 10 5 21"></polyline></svg>
                                <input type="file" id="postFilePicker" hidden accept="image/*" onchange="previewPostImg(this)">
                            </label>
                        </div>
                        <div class="icon-btn" onclick="addNewPost()" style="cursor: pointer; background: #007bff; padding: 8px 16px; border-radius: 12px;">
                            <svg viewBox="0 0 24 24" width="22" height="22" fill="white"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"></path></svg>
                        </div>
                    </div>
                </div>
            </div>
            <div id="postsFeed" style="padding: 0 15px;"></div>
        </section>

        <section id="messages" class="page">
            <div style="padding: 100px 20px; text-align: center;"><h2>الرسائل</h2><p style="color:var(--inactive-color)">لا توجد دردشات حالياً</p></div>
        </section>

        <section id="profile" class="page">
            <div class="profile-header">
                <div class="profile-banner" id="mainBannerDisplay">
                    <div class="edit-banner-btn" onclick="openEditProfile()">
                        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="white" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>
                    </div>
                </div>
                <div class="profile-avatar-section">
                    <div class="profile-pic" id="mainAvatarDisplay">
                        <svg id="mainDefaultAvatar" viewBox="0 0 24 24" width="60" height="60" fill="none" stroke="currentColor" stroke-width="1.2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
                    </div>
                    <div class="profile-name-display" id="mainName">WeStars</div>
                    <div class="profile-id-display" id="mainID">@User</div>
                </div>
            </div>
            <ul class="menu-list">
                <li class="menu-item" onclick="switchPage('settings-page')">
                    <div class="menu-icon"><svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg></div>
                    <div class="menu-label">الإعدادات</div>
                    <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 18l-6-6 6-6"></path></svg>
                </li>
                <li class="menu-item">
                    <div class="menu-icon"><svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path><path d="M14 15l-4-4m0 4l4-4"></path></svg></div>
                    <div class="menu-label">القائمة السوداء</div>
                    <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 18l-6-6 6-6"></path></svg>
                </li>
            </ul>
        </section>

        <section id="edit-profile-page" class="page">
            <div class="sub-header">
                <div class="back-icon" onclick="switchPage('profile')"><svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M9 18l6-6-6-6"></path></svg></div>
                <h3>تعديل المعلومات</h3>
            </div>
            <div style="background: var(--bg-color); padding-bottom: 20px; border-bottom: 1px solid var(--border-color);">
                <div class="profile-banner" id="previewBanner" style="display:flex; align-items:center; justify-content:center;">
                    <button style="background:rgba(0,0,0,0.5); color:white; border:none; padding:8px 16px; border-radius:20px; cursor:pointer;" onclick="document.getElementById('editBannerInput').click()">تغيير البنر</button>
                </div>
                <div class="profile-avatar-section">
                    <div class="profile-pic" id="previewAvatar">
                        <button style="background:rgba(0,0,0,0.5); color:white; border:none; padding:6px 12px; border-radius:20px; cursor:pointer; margin-top:60px;" onclick="document.getElementById('editAvatarInput').click()">تغيير</button>
                    </div>
                </div>
            </div>
            <div class="edit-section">
                <div class="edit-group"><label class="edit-label">الاسم</label><input type="text" id="inputEditName" class="edit-input" maxlength="14"></div>
                <div class="edit-group"><label class="edit-label">المعرف</label><input type="text" id="inputEditID" class="edit-input" maxlength="15"></div>
                <button class="btn-save" onclick="saveProfileChanges()">حفظ وتحديث</button>
            </div>
            <input type="file" id="editBannerInput" hidden accept="image/*" onchange="handleImgPreview(this, 'previewBanner')">
            <input type="file" id="editAvatarInput" hidden accept="image/*" onchange="handleImgPreview(this, 'previewAvatar')">
        </section>

        <section id="settings-page" class="page">
            <div class="sub-header">
                <div class="back-icon" onclick="switchPage('profile')"><svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M9 18l6-6-6-6"></path></svg></div>
                <h3>الإعدادات</h3>
            </div>
            <div style="padding: 20px; display: flex; justify-content: space-between; align-items: center; background: var(--bg-color); margin-top: 15px;">
                <span>الوضع الداكن الاحترافي</span>
                <label class="switch"><input type="checkbox" id="themeToggle" onchange="toggleTheme()"><span class="slider"></span></label>
            </div>
        </section>
    </main>

    <nav class="bottom-nav">
        <div class="nav-item active" id="nav-feed" onclick="switchPage('feed', this)"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"></circle><polygon points="16.24 7.76 14.12 14.12 7.76 16.24 9.88 9.88 16.24 7.76"></polygon></svg></div>
        <div class="nav-item" id="nav-messages" onclick="switchPage('messages', this)"><svg viewBox="0 0 24 24"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"></path></svg></div>
        <div class="nav-item" id="nav-profile" onclick="switchPage('profile', this)"><svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg></div>
    </nav>

    <script>
        let posts = JSON.parse(localStorage.getItem('ws_all_posts')) || [];
        let currentPrivacy = 'عام';
        let selectedPostImg = '';

        function loadSavedData() {
            const name = localStorage.getItem('ws_name') || "WeStars";
            const id = localStorage.getItem('ws_id') || "User";
            const avatar = localStorage.getItem('ws_avatar');
            const banner = localStorage.getItem('ws_banner');
            const theme = localStorage.getItem('ws_theme');

            document.getElementById('mainName').innerText = name;
            document.getElementById('pubUserName').innerText = name;
            document.getElementById('inputEditName').value = name;
            document.getElementById('mainID').innerText = "@" + id;
            document.getElementById('inputEditID').value = id;

            if (avatar) {
                const url = `url(${avatar})`;
                document.getElementById('mainAvatarDisplay').style.backgroundImage = url;
                document.getElementById('previewAvatar').style.backgroundImage = url;
                document.getElementById('pubUserPic').style.backgroundImage = url;
                document.getElementById('mainDefaultAvatar').style.display = 'none';
            }
            if (banner) document.getElementById('mainBannerDisplay').style.backgroundImage = `url(${banner})`;
            if (theme === 'dark') {
                document.documentElement.setAttribute('data-theme', 'dark');
                document.getElementById('themeToggle').checked = true;
            }
            renderPosts('general');
        }

        function switchPage(pageId, element) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            document.getElementById('mainTopNav').style.display = (pageId === 'feed') ? 'flex' : 'none';
            if(element) element.classList.add('active');
            else if(['profile','edit-profile-page','settings-page'].includes(pageId)) document.getElementById('nav-profile').classList.add('active');
        }

        function switchFeedTab(type, el) {
            document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
            el.classList.add('active');
            document.getElementById('ana-publish-zone').style.display = (type === 'ana') ? 'block' : 'none';
            renderPosts(type);
        }

        // --- نظام المنشورات المصلح ---
        function togglePrivacyMenu() {
            const m = document.getElementById('privacyMenu');
            m.style.display = (m.style.display === 'block') ? 'none' : 'block';
        }

        function setPrivacy(p) {
            currentPrivacy = p;
            document.getElementById('privacyLabel').innerText = p;
            document.getElementById('privacyMenu').style.display = 'none'; // اختفاء فوري
        }

        function previewPostImg(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    selectedPostImg = e.target.result;
                    document.getElementById('postImgPreview').src = selectedPostImg;
                    document.getElementById('postImgPreviewZone').style.display = 'block';
                }
                reader.readAsDataURL(input.files[0]);
            }
        }

        function removeSelectedImg() {
            selectedPostImg = '';
            document.getElementById('postImgPreviewZone').style.display = 'none';
            document.getElementById('postFilePicker').value = '';
        }

        function addNewPost() {
            const textInput = document.getElementById('postTextInput');
            const text = textInput.value;
            if(!text.trim() && !selectedPostImg) return;

            const now = new Date();
            const timeStr = `${now.getHours()}:${now.getMinutes().toString().padStart(2, '0')}  ${now.getFullYear()}:${now.getMonth()+1}:${now.getDate()}`;

            const newPost = {
                id: Date.now(),
                userName: localStorage.getItem('ws_name') || "WeStars",
                userId: localStorage.getItem('ws_id') || "User",
                userPic: localStorage.getItem('ws_avatar') || '',
                content: text,
                image: selectedPostImg,
                privacy: currentPrivacy,
                time: timeStr,
                likes: [],
                comments: 0
            };

            posts.unshift(newPost);
            localStorage.setItem('ws_all_posts', JSON.stringify(posts));
            
            // --- تصفير الحقول فوراً بعد النشر ---
            textInput.value = '';
            textInput.style.height = '45px';
            removeSelectedImg();
            
            renderPosts('ana'); // التحديث الفوري للعرض
        }

        function renderPosts(filter) {
            const container = document.getElementById('postsFeed');
            container.innerHTML = '';
            const myId = localStorage.getItem('ws_id') || "User";

            const filtered = posts.filter(p => {
                if(filter === 'ana') return p.userId === myId;
                if(filter === 'friends') return p.privacy === 'الاصدقاء' || p.privacy === 'عام';
                return p.privacy === 'عام';
            });

            filtered.forEach(post => {
                const isLiked = post.likes.includes(myId);
                const postHtml = `
                    <article class="post-card">
                        <div class="post-top">
                            <div class="post-user">
                                <div class="post-pic" style="background-image: url(${post.userPic});"></div>
                                <div class="post-info">
                                    <span class="post-name">${post.userName}</span>
                                    <span class="post-id">@${post.userId}</span>
                                </div>
                            </div>
                            <div class="post-options">
                                <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="1"></circle><circle cx="19" cy="12" r="1"></circle><circle cx="5" cy="12" r="1"></circle></svg>
                            </div>
                        </div>
                        <div class="post-body">${post.content}${post.image ? `<img src="${post.image}" class="post-img">` : ''}</div>
                        <div class="post-footer">
                            <div class="post-interactions">
                                <div class="inter-item ${isLiked ? 'liked' : ''}" onclick="toggleLike(${post.id})">
                                    <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path></svg>
                                    <span>${post.likes.length}</span>
                                </div>
                                <div class="inter-item">
                                    <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"></path></svg>
                                    <span>${post.comments}</span>
                                </div>
                            </div>
                            <div class="post-date">${post.time}</div>
                        </div>
                    </article>
                `;
                container.innerHTML += postHtml;
            });
        }

        function toggleLike(postId) {
            const myId = localStorage.getItem('ws_id') || "User";
            const post = posts.find(p => p.id === postId);
            if(post) {
                const idx = post.likes.indexOf(myId);
                if(idx > -1) post.likes.splice(idx, 1);
                else post.likes.push(myId);
                localStorage.setItem('ws_all_posts', JSON.stringify(posts));
                renderPosts(document.querySelector('.tab-item.active').innerText === 'أنا' ? 'ana' : 'general');
            }
        }

        // --- وظائف الهوية والتعديل (محفوظة) ---
        function openEditProfile() { switchPage('edit-profile-page'); }

        function handleImgPreview(input, targetId) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) { document.getElementById(targetId).style.backgroundImage = `url(${e.target.result})`; }
                reader.readAsDataURL(input.files[0]);
            }
        }

        function saveProfileChanges() {
            const n = document.getElementById('inputEditName').value;
            const i = document.getElementById('inputEditID').value;
            const av = document.getElementById('previewAvatar').style.backgroundImage;
            const bn = document.getElementById('previewBanner').style.backgroundImage;

            if(n.trim()) localStorage.setItem('ws_name', n);
            if(i.trim()) localStorage.setItem('ws_id', i.replace(/[^a-zA-Z0-9]/g, ''));
            if(av && av !== 'none') localStorage.setItem('ws_avatar', av.replace(/url\(["']?|["']?\)$/g, ""));
            if(bn && bn !== 'none') localStorage.setItem('ws_banner', bn.replace(/url\(["']?|["']?\)$/g, ""));
            loadSavedData();
            switchPage('profile');
        }

        function autoGrow(el) { el.style.height = '45px'; el.style.height = (el.scrollHeight) + 'px'; }
        function toggleTheme() {
            const d = document.getElementById('themeToggle').checked;
            document.documentElement.setAttribute('data-theme', d ? 'dark' : 'light');
            localStorage.setItem('ws_theme', d ? 'dark' : 'light');
        }
    </script>
</body>
</html>
