<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>تحدي التخمين - النسخة الاحترافية الكاملة</title>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    
    <style>
        :root { --bg: #08080a; --purple: #bc6ff1; --surface: #16161d; --text: #e2e8f0; --dim: #64748b; --red: #ff4d4d; --green: #2ecc71; }
        * { box-sizing: border-box; font-family: 'IBM Plex Sans Arabic', sans-serif; outline: none; -webkit-tap-highlight-color: transparent; }
        
        body, html { 
            background: var(--bg); color: var(--text); margin: 0; height: 100dvh; width: 100%;
            overflow: hidden; display: flex; flex-direction: column; position: fixed;
        }

        .game-view { display: none; height: 100%; width: 100%; flex-direction: column; }
        .active-view { display: flex; }

        /* --- قائمة البداية --- */
        #mainMenuView { background: radial-gradient(circle at top right, #1a1a2e 0%, #08080a 100%); }
        .top-bar { width: 100%; padding: 25px; display: flex; align-items: center; gap: 12px; cursor: pointer; z-index: 10; }
        .my-avatar { width: 55px; height: 55px; border-radius: 50%; border: 2px solid var(--purple); background: #222; overflow: hidden; object-fit: cover; }
        .level-mini-bar { width: 100px; height: 4px; background: #2d2d35; border-radius: 2px; margin-top: 5px; overflow: hidden; }
        .level-progress-fill { height: 100%; background: var(--purple); width: 0%; transition: 0.8s ease-out; }
        .main-hero { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; width: 100%; }
        .game-logo { font-size: 3rem; font-weight: 800; color: white; margin-bottom: 5px; text-shadow: 0 0 20px rgba(188, 111, 241, 0.5); }
        .game-tagline { color: var(--dim); font-size: 1rem; margin-bottom: 50px; }
        .menu-options { width: 85%; max-width: 340px; display: flex; flex-direction: column; gap: 18px; }
        .btn-main { width: 100%; padding: 18px; border-radius: 20px; border: none; font-size: 1.15rem; font-weight: 700; cursor: pointer; transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); display: flex; align-items: center; justify-content: center; gap: 12px; }
        .btn-play { background: var(--purple); color: white; box-shadow: 0 10px 25px rgba(188, 111, 241, 0.25); }
        .btn-secondary { background: var(--surface); color: white; border: 1px solid #2d2d35; }

        /* --- شاشة البحث --- */
        #searchingOverlay { position: fixed; inset: 0; background: var(--bg); z-index: 9999; display: none; flex-direction: column; align-items: center; justify-content: center; background: radial-gradient(circle, #1a1a2e 0%, #08080a 100%); }
        .vs-container { display: flex; align-items: center; gap: 30px; margin-bottom: 40px; }
        .ludo-box { text-align: center; width: 115px; }
        .ludo-avatar { width: 105px; height: 105px; border-radius: 25px; border: 3px solid var(--purple); object-fit: cover; background: #222; position: relative; z-index: 2; }
        .pulse-ring { position: absolute; inset: 0; border: 3px solid var(--purple); border-radius: 25px; animation: pulse-anim 1.5s infinite; }
        @keyframes pulse-anim { 0% { transform: scale(1); opacity: 0.8; } 100% { transform: scale(1.8); opacity: 0; } }
        .vs-badge { font-size: 2.8rem; font-weight: 900; color: #ff4757; font-style: italic; text-shadow: 0 0 15px rgba(255, 71, 87, 0.4); }

        /* --- الكيم بلاي والأنيميشن --- */
        #roundTransition { display: none; position: fixed; inset: 0; z-index: 9999; background: rgba(0, 0, 0, 0.92); flex-direction: column; justify-content: center; align-items: center; backdrop-filter: blur(10px); }
        .trans-bar { width: 200%; height: 65px; display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 1.5rem; box-shadow: 0 0 40px rgba(0,0,0,0.9); position: relative; overflow: hidden; }
        .trans-bar::after { content: ''; position: absolute; top: 0; left: -100%; width: 50%; height: 100%; background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent); transform: skewX(-20deg); animation: shine 2s infinite; }
        @keyframes shine { 100% { left: 200%; } }
        .trans-bar.top, .trans-bar.bottom { background: #1a1a20; color: var(--purple); border-top: 2px solid var(--purple); border-bottom: 2px solid var(--purple); }
        .trans-bar.mid { background: var(--purple); color: #000; margin: 15px 0; }
        .slide-in-top { animation: slideInLeft 0.7s cubic-bezier(0.68, -0.55, 0.27, 1.55) forwards; }
        .slide-in-mid { animation: slideInRight 0.7s cubic-bezier(0.68, -0.55, 0.27, 1.55) forwards; animation-delay: 0.1s; }
        .slide-in-bottom { animation: slideInLeft 0.7s cubic-bezier(0.68, -0.55, 0.27, 1.55) forwards; animation-delay: 0.2s; }
        .slide-out-top { animation: slideOutLeft 0.5s cubic-bezier(0.6, -0.28, 0.735, 0.045) forwards !important; }
        .slide-out-mid { animation: slideOutRight 0.5s cubic-bezier(0.6, -0.28, 0.735, 0.045) forwards !important; }
        .slide-out-bottom { animation: slideOutLeft 0.5s cubic-bezier(0.6, -0.28, 0.735, 0.045) forwards !important; }
        @keyframes slideInLeft { from { transform: rotate(-8deg) translateX(-150%); } to { transform: rotate(-8deg) translateX(0); } }
        @keyframes slideInRight { from { transform: rotate(-8deg) translateX(150%); } to { transform: rotate(-8deg) translateX(0); } }
        @keyframes slideOutLeft { to { transform: rotate(-8deg) translateX(-200%); opacity: 0; } }
        @keyframes slideOutRight { to { transform: rotate(-8deg) translateX(200%); opacity: 0; } }

        .header { padding: 15px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #2d2d35; flex-shrink: 0; }
        .avatar-circle { width: 45px; height: 45px; border-radius: 50%; background: #333; border: 2px solid var(--purple); overflow: hidden; }
        .round-indicator { background: #2d2d35; padding: 4px 12px; border-radius: 10px; font-size: 0.8rem; color: var(--purple); font-weight: bold; }
        .arena { flex-shrink: 0; padding: 20px 10px; display: flex; justify-content: center; gap: 15px; }
        .card-box { flex: 1; max-width: 145px; text-align: center; }
        .card { aspect-ratio: 3/4; background: #1a1a20; border-radius: 20px; border: 1px solid #333; overflow: hidden; }
        .card img { width: 100%; height: 100%; object-fit: cover; transition: filter 0.5s ease; }
        .blur-img { filter: blur(30px) brightness(0.6); }
        .chat-section { flex: 1; background: #1a1a20; margin: 0 15px; border-radius: 25px 25px 0 0; border: 1px solid rgba(188, 111, 241, 0.2); display: flex; flex-direction: column; overflow: hidden; position: relative; }
        .voice-controls { position: absolute; top: 15px; left: 15px; display: flex; gap: 8px; z-index: 100; align-items: center; }
        .voice-btn { width: 38px; height: 38px; border-radius: 50%; border: 1px solid #333; background: #16161d; color: white; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .correct-btn { background: var(--green); border-radius: 8px; padding: 0 12px; font-weight: bold; font-size: 0.75rem; color: white; border: none; height: 35px; cursor: pointer; }
        .correct-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .chat-messages { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; padding-bottom: 80px; scrollbar-width: none; }
        .msg { padding: 10px 15px; border-radius: 18px; max-width: 80%; font-size: 0.85rem; background: var(--purple); color: #000; align-self: flex-start; }
        .msg.opp-msg { background: #2d2d35; color: white; align-self: flex-end; }
        .input-area { position: absolute; bottom: 0; left: 0; right: 0; padding: 12px 15px 25px; background: #16161d; display: flex; gap: 10px; border-top: 1px solid #2d2d35; z-index: 1000; }
        input[type="text"] { flex: 1; background: #2d2d35; border: none; padding: 12px; border-radius: 12px; color: white; outline: none; }
        .send-btn { background: var(--purple); border: none; width: 45px; height: 45px; border-radius: 12px; display: flex; align-items: center; justify-content: center; cursor: pointer; }

        /* مودالات */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 5000; align-items: center; justify-content: center; backdrop-filter: blur(12px); }
        .card-content { background: var(--surface); width: 85%; max-width: 300px; padding: 35px 25px; border-radius: 35px; border: 1px solid rgba(188, 111, 241, 0.3); text-align: center; position: relative; animation: pop 0.3s ease; }
        .profile-pic-large { width: 95px; height: 95px; border-radius: 50%; border: 3px solid var(--purple); margin: 0 auto 15px; object-fit: cover; display: block; }
        .level-info-card { background: #0d0d12; padding: 15px; border-radius: 20px; margin: 15px 0; border: 1px solid #2d2d35; }
        .save-btn { width: 100%; background: var(--purple); color: white; border: none; padding: 15px; border-radius: 15px; font-weight: bold; cursor: pointer; }
        .edit-icon-btn { position: absolute; top: 20px; left: 20px; background: rgba(188, 111, 241, 0.1); border-radius: 10px; padding: 8px; cursor: pointer; transition: 0.3s; display: flex; align-items: center; justify-content: center; border: 1px solid rgba(188, 111, 241, 0.2); }
    </style>
</head>
<body>

    <div id="mainMenuView" class="game-view active-view">
        <div class="top-bar" onclick="openProfile()">
            <img id="headerAvatar" src="" class="my-avatar">
            <div style="margin-right: 10px;">
                <div id="headerName" style="font-weight: 700; font-size: 1.15rem;">لاعب جديد</div>
                <div id="headerLevelText" style="font-size: 0.75rem; color: var(--purple);">المستوى 1</div>
                <div class="level-mini-bar"><div id="miniProgress" class="level-progress-fill"></div></div>
            </div>
        </div>
        <div class="main-hero">
            <h1 class="game-logo">تحدي التخمين</h1>
            <p class="game-tagline">أظهر ذكاءك في تخمين الصور</p>
            <div class="menu-options">
                <button class="btn-main btn-play" onclick="startLudoSearch()">ابدأ التحدي</button>
                <button class="btn-main btn-secondary">المتجر</button>
                <button class="btn-main btn-secondary">الإعدادات</button>
            </div>
        </div>
    </div>

    <div id="searchingOverlay">
        <div class="vs-container">
            <div class="ludo-box">
                <div style="position:relative"><div class="pulse-ring"></div><img id="mySearchAvatar" src="" class="ludo-avatar"></div>
                <div id="mySearchName" style="margin-top:10px; font-weight:700; font-size:0.9rem;">أنت</div>
            </div>
            <div class="vs-badge">VS</div>
            <div class="ludo-box">
                <img id="oppAvatarSearch" src="https://api.dicebear.com/7.x/avataaars/svg?seed=placeholder" class="ludo-avatar" style="border-color:#ff4757">
                <div id="oppNameSearch" style="margin-top:10px; font-weight:700; font-size:0.9rem; color:#ff4757">جاري البحث..</div>
            </div>
        </div>
        <p id="statusMsg" style="font-weight:600; font-size: 1.1rem; color: white;">جارٍ البحث عن منافس...</p>
        <button class="btn-main btn-secondary" style="width:150px; margin-top:30px; font-size: 0.9rem;" onclick="stopSearch()">إلغاء البحث</button>
    </div>

    <div id="gamePlayView" class="game-view">
        <div id="roundTransition">
            <div class="trans-bar top" id="transOppName">الخصم : 0</div>
            <div class="trans-bar mid" id="transRoundTxt">الجولة 1</div>
            <div class="trans-bar bottom" id="transMyName">انت : 0</div>
        </div>

        <div id="resultsModal" class="modal">
            <div class="card-content" style="background: var(--bg); border:none;">
                <div style="margin-bottom: 20px; font-size: 4rem;">🏆</div>
                <h2 id="finalStatus" style="margin: 0; color: white; font-weight: 700;">انتهى التحدي</h2>
                <div style="margin: 30px 0;">
                    <div style="display: flex; justify-content: center; gap: 10px; margin-bottom: 15px; font-size: 1.1rem;">
                        <span style="color: white;">نقاطك:</span>
                        <span id="myFinalScore" style="color: var(--purple); font-weight: bold;">0</span>
                    </div>
                    <div style="display: flex; justify-content: center; gap: 10px; font-size: 1.1rem;">
                        <span style="color: white;">نقاط الخصم:</span>
                        <span id="oppFinalScore" style="color: var(--green); font-weight: bold;">0</span>
                    </div>
                </div>
                <button class="btn-main btn-play" style="width: 100%; border-radius: 15px;" onclick="location.reload()">خروج للقائمة</button>
            </div>
        </div>

        <div class="header">
            <div style="display: flex; align-items: center; gap: 12px;">
                <div class="avatar-circle"><img id="gameOppAvatar" src="" style="width:100%;height:100%"></div>
                <div style="display: flex; flex-direction: column;">
                    <span id="gameOppName" style="font-weight:600;">الخصم</span>
                    <span id="gameOppXP" style="font-size:0.75rem; color:var(--purple); font-weight: bold;">XP: 0</span>
                </div>
            </div>
            <div class="round-indicator" id="roundTxt">الجولة 1/3</div>
        </div>

        <div class="arena">
            <div class="card-box"><div class="card"><img class="blur-img" id="oppCardImg" src=""></div><div class="label">بطاقة الخصم</div></div>
            <div class="card-box"><div class="card" style="border-color: var(--purple);"><img id="myCardImg" src=""></div><div class="label">بطاقتك</div></div>
        </div>

        <div class="chat-section">
            <div class="voice-controls">
                <button id="correctBtn" class="correct-btn" onclick="handleCorrectClick()">صحيح</button>
                <button class="voice-btn">🎤</button>
            </div>
            <div class="chat-messages" id="chatBox"></div>
        </div>

        <div class="input-area">
            <input type="text" id="userInput" placeholder="اكتب تخمينك هنا...">
            <button class="send-btn" onclick="sendMessage()">✈️</button>
        </div>
    </div>

    <div id="profileModal" class="modal">
        <div class="card-content">
            <div class="edit-icon-btn" onclick="openEdit()">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>
            </div>
            <img id="cardAvatar" src="" class="profile-pic-large">
            <h2 id="cardName" style="margin: 0;">لاعب جديد</h2>
            <div class="level-info-card">
                <span id="cardLevelLabel">المستوى 1</span>
                <div class="level-mini-bar" style="width: 100%; height: 8px;"><div id="cardProgress" class="level-progress-fill"></div></div>
            </div>
            <div style="display: flex; justify-content: space-around;">
                <div><div id="totalWins" style="font-weight: 700; color: var(--purple);">0</div><div style="font-size:0.7rem; color: var(--dim);">فوز</div></div>
                <div><div id="totalXP" style="font-weight: 700; color: var(--purple);">0</div><div style="font-size:0.7rem; color: var(--dim);">XP</div></div>
            </div>
            <button class="save-btn" style="margin-top:20px" onclick="closeAll()">إغلاق</button>
        </div>
    </div>

    <div id="editModal" class="modal">
        <div class="card-content">
            <h3 style="margin-top:0">تعديل البيانات</h3>
            
            <div style="position: relative; display: inline-block; margin-bottom: 20px;">
                <img id="editPreviewAvatar" src="" class="profile-pic-large" style="opacity: 0.7;">
                <input type="file" id="fileInp" accept="image/*" onchange="autoSaveImage(event)" style="position: absolute; inset: 0; opacity: 0; cursor: pointer;">
                <div style="font-size: 0.7rem; color: var(--purple); margin-top: 5px;">اضغط لتغيير الصورة</div>
            </div>

            <input type="text" id="nameInput" placeholder="الاسم الجديد" style="width:100%; padding:15px; background:#08080a; border:1px solid #333; color:#fff; border-radius:15px; text-align:center; margin-bottom:15px">
            <button class="save-btn" onclick="saveName()">حفظ التعديلات</button>
            <p style="font-size: 0.8rem; color: var(--dim); margin-top: 15px; cursor: pointer;" onclick="closeAll()">إلغاء</p>
        </div>
    </div>

    <script>
        const firebaseConfig = { databaseURL: "https://westarts-75dd6-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let myID = localStorage.getItem('guessGameID') || "user_" + Math.floor(Math.random() * 1000000);
        localStorage.setItem('guessGameID', myID);

        let userData = { name: "لاعب جديد", avatar: `https://api.dicebear.com/7.x/avataaars/svg?seed=${myID}`, xp: 0, wins: 0 };
        const XP_PER_LEVEL = 500;
        
        let currentRoom = null, isHost = false, currentRound = 1, myPoints = 0, oppPoints = 0, foundOpp = null, canClickCorrect = true;

        function updateUI() {
            const level = Math.floor(userData.xp / XP_PER_LEVEL) + 1;
            const progress = ((userData.xp % XP_PER_LEVEL) / XP_PER_LEVEL) * 100;
            document.getElementById('headerName').innerText = userData.name;
            document.getElementById('cardName').innerText = userData.name;
            document.getElementById('headerLevelText').innerText = "المستوى " + level;
            document.getElementById('cardLevelLabel').innerText = "المستوى " + level;
            document.getElementById('miniProgress').style.width = progress + "%";
            document.getElementById('cardProgress').style.width = progress + "%";
            document.getElementById('totalWins').innerText = userData.wins;
            document.getElementById('totalXP').innerText = userData.xp;
            
            const avatars = ['headerAvatar', 'cardAvatar', 'mySearchAvatar', 'editPreviewAvatar'];
            avatars.forEach(id => { if(document.getElementById(id)) document.getElementById(id).src = userData.avatar; });
            document.getElementById('mySearchName').innerText = userData.name;
        }

        // ميزة تغيير الصورة
        function autoSaveImage(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (ev) => { 
                    userData.avatar = ev.target.result; 
                    saveToStorage(); 
                    updateUI(); 
                };
                reader.readAsDataURL(file);
            }
        }

        function openEdit() {
            document.getElementById('profileModal').style.display = 'none';
            document.getElementById('editModal').style.display = 'flex';
            document.getElementById('nameInput').value = userData.name;
        }

        function saveName() {
            const val = document.getElementById('nameInput').value.trim();
            if(val) { userData.name = val; saveToStorage(); updateUI(); closeAll(); }
        }

        function startLudoSearch() {
            document.getElementById('searchingOverlay').style.display = 'flex';
            const matchRef = db.ref('matchmaking');
            matchRef.once('value').then((snap) => {
                let found = false;
                snap.forEach((child) => {
                    if (child.key !== myID && !found) {
                        found = true;
                        let peer = child.val();
                        let roomID = "room_" + Math.min(myID, child.key) + "_" + Math.max(myID, child.key);
                        currentRoom = roomID;
                        foundOpp = { name: peer.name, avatar: peer.avatar, id: child.key, xp: peer.xp };
                        isHost = false; 
                        db.ref('rooms/' + roomID).set({
                            players: { [myID]: userData, [child.key]: peer },
                            status: "playing",
                            scores: { [myID]: 0, [child.key]: 0 },
                            currentRound: 1, lastAction: "", timestamp: Date.now()
                        }).then(() => { matchRef.child(child.key).remove(); initGameUI(); });
                    }
                });
                if (!found) {
                    matchRef.child(myID).set(userData);
                    isHost = true;
                    db.ref('rooms').on('child_added', (snap) => {
                        if (snap.key.includes(myID)) {
                            currentRoom = snap.key;
                            db.ref('rooms/' + currentRoom + '/players').once('value', (pSnap) => {
                                let players = pSnap.val();
                                let peerID = Object.keys(players).find(id => id !== myID);
                                foundOpp = { name: players[peerID].name, avatar: players[peerID].avatar, id: peerID, xp: players[peerID].xp };
                                matchRef.child(myID).remove();
                                db.ref('rooms').off('child_added');
                                initGameUI();
                            });
                        }
                    });
                }
            });
        }

        function initGameUI() {
            document.getElementById('searchingOverlay').style.display = 'none';
            document.getElementById('mainMenuView').classList.remove('active-view');
            document.getElementById('gamePlayView').classList.add('active-view');
            document.getElementById('gameOppName').innerText = foundOpp.name;
            document.getElementById('gameOppAvatar').src = foundOpp.avatar;
            document.getElementById('gameOppXP').innerText = "XP: " + foundOpp.xp; // عرض XP الخصم
            listenToGame();
            if(isHost) generateImages(); 
            showTransition(1);
        }

        function generateImages() {
            db.ref('bank_images').once('value').then((snap) => {
                let imgs = []; snap.forEach(c => { if(c.val().url) imgs.push(c.val().url); });
                if(imgs.length >= 2) {
                    let i1 = Math.floor(Math.random() * imgs.length);
                    let i2; do { i2 = Math.floor(Math.random() * imgs.length); } while(i1 === i2);
                    db.ref('rooms/' + currentRoom + '/images').set({ hostImg: imgs[i1], peerImg: imgs[i2], r: currentRound });
                }
            });
        }

        function listenToGame() {
            const roomRef = db.ref('rooms/' + currentRoom);
            roomRef.on('value', (snap) => {
                const data = snap.val();
                if(!data) return;
                myPoints = data.scores[myID] || 0;
                oppPoints = data.scores[foundOpp.id] || 0;
                if(data.images) {
                    const myUrl = isHost ? data.images.hostImg : data.images.peerImg;
                    const oppUrl = isHost ? data.images.peerImg : data.images.hostImg;
                    if(document.getElementById('myCardImg').src !== myUrl) {
                        document.getElementById('myCardImg').src = myUrl;
                        document.getElementById('oppCardImg').src = oppUrl;
                        document.getElementById('oppCardImg').classList.add('blur-img');
                        canClickCorrect = true; 
                        document.getElementById('correctBtn').disabled = false;
                    }
                }
                if(data.lastAction === "correct_" + foundOpp.id) {
                    document.getElementById('oppCardImg').classList.remove('blur-img');
                    setTimeout(() => nextRound(), 3000);
                }
            });
            db.ref('chats/' + currentRoom).on('child_added', (snap) => {
                const msg = snap.val();
                if(msg.sender !== myID) displayMsg(msg.text, 'opp');
            });
        }

        function handleCorrectClick() {
            if(!canClickCorrect) return;
            canClickCorrect = false;
            document.getElementById('correctBtn').disabled = true;
            document.getElementById('oppCardImg').classList.remove('blur-img');
            db.ref('rooms/' + currentRoom + '/scores/' + myID).set(myPoints + 100);
            db.ref('rooms/' + currentRoom + '/lastAction').set("correct_" + myID);
            setTimeout(() => { db.ref('rooms/' + currentRoom + '/lastAction').set(""); nextRound(); }, 3000);
        }

        function nextRound() {
            if(currentRound < 3) {
                currentRound++;
                showTransition(currentRound, false, () => { if(isHost) generateImages(); });
            } else { finalizeGame(); }
        }

        function finalizeGame() {
            showTransition(3, true, () => {
                document.getElementById('myFinalScore').innerText = myPoints;
                document.getElementById('oppFinalScore').innerText = oppPoints;
                userData.xp += (myPoints / 2);
                if(myPoints > oppPoints) { userData.wins += 1; document.getElementById('finalStatus').innerText = "مبروك الفوز! 🏆"; }
                else if(myPoints < oppPoints) { document.getElementById('finalStatus').innerText = "حظ أوفر المرة القادمة"; }
                else { document.getElementById('finalStatus').innerText = "تعادل رائع!"; }
                saveToStorage(); updateUI();
                document.getElementById('resultsModal').style.display = 'flex';
                if(isHost) db.ref('rooms/' + currentRoom).remove();
            });
        }

        function showTransition(r, isFinal=false, cb) {
            const trans = document.getElementById('roundTransition');
            document.getElementById('transOppName').innerText = `${foundOpp ? foundOpp.name : 'الخصم'} : ${oppPoints}`;
            document.getElementById('transMyName').innerText = `أنت : ${myPoints}`;
            document.getElementById('transRoundTxt').innerText = isFinal ? "النتيجة النهائية" : `الجولة ${r}`;
            if(!isFinal) document.getElementById('roundTxt').innerText = `الجولة ${r}/3`;
            trans.style.display = 'flex';
            const bars = document.querySelectorAll('.trans-bar');
            bars.forEach(b => b.style.animation = 'none'); 
            setTimeout(() => {
                bars[0].className = 'trans-bar top slide-in-top'; 
                bars[1].className = 'trans-bar mid slide-in-mid'; 
                bars[2].className = 'trans-bar bottom slide-in-bottom';
            }, 50);
            setTimeout(() => { 
                bars[0].classList.replace('slide-in-top', 'slide-out-top'); 
                bars[1].classList.replace('slide-in-mid', 'slide-out-mid'); 
                bars[2].classList.replace('slide-in-bottom', 'slide-out-bottom'); 
            }, 4000);
            setTimeout(() => { trans.style.display='none'; if(cb) cb(); }, 4500);
        }

        function sendMessage() {
            const inp = document.getElementById('userInput');
            if(!inp.value.trim()) return;
            db.ref('chats/' + currentRoom).push({ sender: myID, text: inp.value });
            displayMsg(inp.value, 'me');
            inp.value = "";
        }

        function displayMsg(txt, type) {
            const box = document.getElementById('chatBox');
            const m = document.createElement('div');
            m.className = 'msg' + (type === 'opp' ? ' opp-msg' : '');
            m.textContent = txt;
            box.appendChild(m);
            box.scrollTop = box.scrollHeight;
        }

        function saveToStorage() { localStorage.setItem('guessGameUser', JSON.stringify(userData)); }
        function openProfile() { document.getElementById('profileModal').style.display = 'flex'; }
        function closeAll() { document.querySelectorAll('.modal').forEach(m => m.style.display = 'none'); }
        function stopSearch() { db.ref('matchmaking/' + myID).remove(); location.reload(); }

        window.onload = () => {
            const saved = localStorage.getItem('guessGameUser');
            if(saved) userData = JSON.parse(saved);
            updateUI();
        };
    </script>
</body>
</html>
