<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WeStars Ultimate Elite 2026</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <style>
        :root {
            --bg-color: #ffffff;
            --page-bg: #f1f2f6;
            --text-color: #1a1a1a;
            --nav-bg: #ffffff;
            --accent-color: #00d2ff;
            --inactive-color: #a0a0a0;
            --border-color: #e0e0e0;
            --card-bg: #ffffff;
            --input-bg: #f1f2f6;
            --danger-color: #ff4757;
            --chat-bubble-me: #00d2ff;
            --chat-bubble-other: #f1f2f6;
        }

        [data-theme="dark"] {
            --bg-color: #0b0b0b;
            --page-bg: #000000;
            --text-color: #ffffff;
            --nav-bg: #0f0f0f;
            --accent-color: #00d2ff;
            --inactive-color: #666666;
            --border-color: #1f1f1f;
            --card-bg: #121212;
            --input-bg: #1c1c1c;
            --chat-bubble-other: #1c1c1c;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--page-bg); color: var(--text-color); height: 100vh; display: flex; flex-direction: column; overflow: hidden; transition: 0.3s; position: relative; }

        .content { flex: 1; position: relative; overflow: hidden; }
        .page { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: none; overflow-y: auto; padding-bottom: 90px; }
        .page.active { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* --- Header --- */
        .msg-header { padding: 25px 20px 5px; background: var(--nav-bg); display: flex; justify-content: space-between; align-items: center; }
        .msg-header-title { font-weight: 900; font-size: 1.5rem; }
        .add-friend-btn { width: 40px; height: 40px; border-radius: 12px; background: var(--input-bg); display: flex; align-items: center; justify-content: center; cursor: pointer; color: var(--accent-color); }
        .search-area { padding: 10px 15px 15px; background: var(--nav-bg); border-bottom: 1px solid var(--border-color); }
        .msg-list-item { display: flex; align-items: center; padding: 15px; background: var(--card-bg); border-bottom: 1px solid var(--border-color); cursor: pointer; position: relative; }
        .msg-avatar { width: 55px; height: 55px; border-radius: 50%; background-size: cover; border: 2px solid var(--accent-color); margin-left: 12px; position: relative; }

        /* --- Unread Badge --- */
        .unread-badge { position: absolute; top: 15px; right: 20px; background: var(--danger-color); color: white; min-width: 20px; height: 20px; border-radius: 10px; font-size: 0.7rem; display: none; align-items: center; justify-content: center; font-weight: bold; padding: 0 6px; border: 2px solid var(--card-bg); }

        /* --- Chat Window --- */
        #chat-window { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg-color); z-index: 3000; display: none; flex-direction: column; }
        .chat-header { height: 60px; background: var(--nav-bg); border-bottom: 1px solid var(--border-color); display: flex; align-items: center; padding: 0 15px; }
        .chat-body { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 15px; }
        .chat-footer { padding: 10px 15px 25px; background: var(--nav-bg); border-top: 1px solid var(--border-color); display: flex; flex-direction: column; gap: 5px; }
        
        #edit-indicator { display: none; background: var(--input-bg); padding: 8px 12px; border-radius: 10px; border-right: 4px solid var(--accent-color); margin-bottom: 5px; align-items: center; justify-content: space-between; font-size: 0.85rem; }

        .bubble { max-width: 85%; padding: 10px 14px; border-radius: 18px; font-size: 0.95rem; position: relative; word-wrap: break-word; }
        .bubble.me { background: var(--chat-bubble-me); color: #fff; border-top-right-radius: 4px; align-self: flex-start; text-align: right; }
        .bubble.other { background: var(--chat-bubble-other); color: var(--text-color); border-top-left-radius: 4px; align-self: flex-end; text-align: left; }
        .bubble-time { font-size: 0.65rem; color: inherit; opacity: 0.7; margin-top: 5px; display: block; direction: ltr; }

        /* --- Popups --- */
        .custom-popup { position: fixed; background: var(--card-bg); border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); border: 1px solid var(--border-color); z-index: 9000; display: none; min-width: 170px; overflow: hidden; animation: popIn 0.2s; }
        @keyframes popIn { from { transform: scale(0.95); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        .popup-btn { padding: 14px; font-size: 0.9rem; border-bottom: 1px solid var(--border-color); cursor: pointer; text-align: center; color: var(--text-color); font-weight: 500; }
        .popup-btn:last-child { border-bottom: none; }
        .popup-btn:active { background: var(--input-bg); }
        
        /* --- Preview Image --- */
        .preview-box { display: none; padding: 10px; background: var(--input-bg); border-radius: 15px; position: relative; margin-bottom: 8px; width: fit-content; }
        .preview-img { max-height: 100px; border-radius: 10px; display: block; }
        .close-preview { position: absolute; top: -5px; right: -5px; background: var(--danger-color); color: white; border-radius: 50%; width: 22px; height: 22px; text-align: center; cursor: pointer; line-height: 20px; font-weight: bold; border: 2px solid var(--nav-bg); }

        /* --- Global --- */
        .styled-input { width: 100%; padding: 12px; border-radius: 12px; border: 1.5px solid var(--border-color); background: var(--input-bg); color: var(--text-color); outline: none; }
        .avatar-main { width: 110px; height: 110px; border-radius: 50%; border: 5px solid var(--bg-color); background-size: cover; margin: -55px auto 10px; position: relative; z-index: 5; background-color: #eee; }
        .banner { width: 100%; height: 160px; background: #222; background-size: cover; position: relative; }
        .bottom-nav { position: fixed; bottom: 0; width: 100%; height: 70px; background: var(--nav-bg); border-top: 1px solid var(--border-color); display: flex; z-index: 1000; }
        .nav-btn { flex: 1; display: flex; justify-content: center; align-items: center; }
        .nav-btn.active svg { stroke: var(--accent-color); }
        .toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: var(--danger-color); color: white; padding: 10px 20px; border-radius: 20px; z-index: 11000; display: none; }
        .theme-icon { width: 45px; height: 45px; border-radius: 50%; background: var(--input-bg); display: flex; align-items: center; justify-content: center; margin-left: 15px; transition: 0.3s; }
    </style>
</head>

    <div id="lb" onclick="this.style.display='none'" style="position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.95); z-index:11000; display:none; align-items:center; justify-content:center;"><img id="lbImg" style="max-width:98%; max-height:95%;"></div>
    
    <div id="msgPopup" class="custom-popup" onclick="event.stopPropagation()"></div>

    <script>
        const firebaseConfig = { databaseURL: "https://westart-ac4d2-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let currentFriend = null, selectedMsgId = null, selectedMsgText = "", selectedMsgImg = null;
        let tempChatImg = null, isEditMode = false;
        let myID = localStorage.getItem('myStarsID') || 'user' + Math.floor(Math.random()*9999);
        localStorage.setItem('myStarsID', myID);

        const userData = {
            name: localStorage.getItem('myName') || "WeStars",
            id: myID,
            avatar: localStorage.getItem('myAv') || "",
            banner: localStorage.getItem('myBan') || ""
        };

        let myFriends = JSON.parse(localStorage.getItem('myFriendsList')) || [];

        function init() {
            renderFriends(); loadProfile();
            document.body.setAttribute('data-theme', 'dark');
            syncWithFirebase();
            startUnreadMonitor();
        }

        function playSound(type) {
            const sSend = document.getElementById('soundSend');
            const sReceive = document.getElementById('soundReceive');
            if(type === 'send') { sSend.currentTime = 0; sSend.play().catch(e => console.log('Audio error:', e)); }
            if(type === 'receive') { sReceive.currentTime = 0; sReceive.play().catch(e => console.log('Audio error:', e)); }
        }

        function syncWithFirebase() { db.ref('users/' + userData.id).set({ name: userData.name, id: userData.id, avatar: userData.avatar }); }

        function goPage(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById('page-' + id).classList.add('active');
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            if(id === 'messages') document.querySelectorAll('.nav-btn')[0].classList.add('active');
            if(id === 'profile') document.querySelectorAll('.nav-btn')[1].classList.add('active');
        }

        function openChat(id) {
            currentFriend = myFriends.find(f => f.id === id);
            document.getElementById('chat-user-name').innerText = currentFriend.name;
            document.getElementById('chat-user-avatar').style.backgroundImage = `url('${currentFriend.avatar || 'https://via.placeholder.com/100'}')`;
            document.getElementById('chat-window').style.display = 'flex';
            const chatID = [userData.id, currentFriend.id].sort().join('_');
            
            db.ref('chats/' + chatID).once('value', snap => {
                const msgs = snap.val();
                if(msgs) {
                    Object.keys(msgs).forEach(key => {
                        if(msgs[key].sender !== userData.id) db.ref('chats/' + chatID + '/' + key).update({ seen: true });
                    });
                }
            });

            db.ref('chats/' + chatID).on('value', snap => renderMessages(snap.val()));
        }

        function renderMessages(msgs) {
            const container = document.getElementById('chat-body');
            const oldHeight = container.scrollHeight;
            container.innerHTML = '';
            if(!msgs) return;

            let lastMsg = null;
            Object.keys(msgs).forEach(key => {
                const m = msgs[key];
                lastMsg = m;
                if(m.deletedBy && m.deletedBy === userData.id) return;
                const isMe = m.sender === userData.id;
                container.innerHTML += `
                    <div class="bubble ${isMe ? 'me' : 'other'}" 
                         oncontextmenu="handleLongPress(event, '${key}', '${m.text || ''}', '${m.img || ''}', '${m.sender}')" 
                         ontouchstart="touchStart(event, '${key}', '${m.text || ''}', '${m.img || ''}', '${m.sender}')"
                         ontouchend="touchEnd()">
                        ${m.img ? `<img src="${m.img}" style="width:100%; border-radius:10px; margin-bottom:5px; cursor:pointer;" onclick="viewImg('${m.img}')">` : ''}
                        ${m.text || ''}
                        <span class="bubble-time">${m.time} | ${m.date}</span>
                    </div>`;
            });

            // تشغيل الصوت عند وصول رسالة جديدة وأنت داخل الدردشة
            if (lastMsg && lastMsg.sender !== userData.id && !lastMsg.seen) {
                const chatID = [userData.id, currentFriend.id].sort().join('_');
                db.ref('chats/' + chatID).once('value', snap => {
                   playSound('send'); // الصوت الأول لأنك داخل الدردشة
                });
            }

            container.scrollTop = container.scrollHeight;
        }

        function startUnreadMonitor() {
            myFriends.forEach(f => {
                const chatID = [userData.id, f.id].sort().join('_');
                db.ref('chats/' + chatID).on('value', snap => {
                    const msgs = snap.val();
                    let count = 0;
                    let lastSender = "";
                    if(msgs) {
                        Object.keys(msgs).forEach(k => {
                            if(msgs[k].sender !== userData.id && !msgs[k].seen) {
                                count++;
                                lastSender = msgs[k].sender;
                            }
                        });
                    }
                    
                    const badge = document.getElementById('badge-' + f.id);
                    if(badge) {
                        // تشغيل الصوت الثاني (التنبيه الخارجي) إذا وصلت رسالة وأنت لست في دردشتها
                        if (count > parseInt(badge.innerText || 0) && (!currentFriend || currentFriend.id !== f.id)) {
                            playSound('receive');
                        }
                        badge.innerText = count;
                        badge.style.display = count > 0 ? 'flex' : 'none';
                    }
                });
            });
        }

        let touchTimer;
        function touchStart(e, id, text, img, sender) { touchTimer = setTimeout(() => handleLongPress(e, id, text, img, sender), 1500); }
        function touchEnd() { if(touchTimer) clearTimeout(touchTimer); }

        function handleLongPress(e, id, text, img, sender) {
            if(touchTimer) clearTimeout(touchTimer);
            e.preventDefault();
            selectedMsgId = id; selectedMsgText = text; selectedMsgImg = img;
            const pop = document.getElementById('msgPopup');
            const isMe = sender === userData.id;
            pop.innerHTML = isMe ? `
                <div class="popup-btn" onclick="enterEditMode()">تعديل</div>
                <div class="popup-btn" onclick="deleteMessage('me')">حذف لدي</div>
                <div class="popup-btn" style="color:var(--danger-color);" onclick="deleteMessage('all')">حذف لدى الجميع</div>
            ` : `<div class="popup-btn" onclick="deleteMessage('me')">حذف لدي</div>`;
            pop.style.display = 'block';
            let x = (e.clientX || (e.touches ? e.touches[0].clientX : 100)) - 85;
            let y = (e.clientY || (e.touches ? e.touches[0].clientY : 100)) - 40;
            pop.style.left = Math.max(10, Math.min(x, window.innerWidth - 180)) + 'px';
            pop.style.top = Math.max(10, Math.min(y, window.innerHeight - 150)) + 'px';
        }

        function enterEditMode() {
            isEditMode = true; closeAllUI();
            document.getElementById('edit-indicator').style.display = 'flex';
            document.getElementById('chat-input').value = selectedMsgText;
            document.getElementById('send-icon-svg').innerHTML = '<path d="M20 6L9 17l-5-5" stroke="white" stroke-width="3" fill="none"/>';
            if(selectedMsgImg && selectedMsgImg !== "undefined") {
                tempChatImg = selectedMsgImg;
                document.getElementById('chatImgPrevBox').style.display = 'block';
                document.getElementById('chatImgPrevSrc').src = selectedMsgImg;
            }
            document.getElementById('chat-input').focus();
        }

        function cancelEditMode() {
            isEditMode = false;
            document.getElementById('edit-indicator').style.display = 'none';
            document.getElementById('chat-input').value = '';
            document.getElementById('send-icon-svg').innerHTML = '<path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"></path>';
            removeChatImg();
        }

        function sendMessage() {
            const inp = document.getElementById('chat-input');
            const text = inp.value.trim();
            if(!text && !tempChatImg) return;
            const chatID = [userData.id, currentFriend.id].sort().join('_');
            if(isEditMode) {
                db.ref('chats/' + chatID + '/' + selectedMsgId).update({ text: text, img: tempChatImg });
                cancelEditMode();
            } else {
                const now = new Date();
                const time = now.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', hour12: true });
                const date = now.getFullYear() + "/" + (now.getMonth() + 1).toString().padStart(2,'0') + "/" + now.getDate().toString().padStart(2,'0');
                db.ref('chats/' + chatID).push({ sender: userData.id, text, img: tempChatImg, time, date, seen: false }).then(() => {
                    playSound('send');
                });
                inp.value = ''; removeChatImg();
            }
        }

        function handleFile(input) {
            const reader = new FileReader();
            reader.onload = e => {
                tempChatImg = e.target.result;
                document.getElementById('chatImgPrevBox').style.display = 'block';
                document.getElementById('chatImgPrevSrc').src = tempChatImg;
            };
            reader.readAsDataURL(input.files[0]);
        }

        function removeChatImg() { 
            tempChatImg = null; document.getElementById('chatImgPrevBox').style.display = 'none'; document.getElementById('chatFileInput').value = '';
        }

        function deleteMessage(type) {
            const chatID = [userData.id, currentFriend.id].sort().join('_');
            if(type === 'all') db.ref('chats/' + chatID + '/' + selectedMsgId).remove();
            else db.ref('chats/' + chatID + '/' + selectedMsgId).update({ deletedBy: userData.id });
            closeAllUI();
        }

        function closeAllUI() { document.getElementById('msgPopup').style.display = 'none'; }
        function closeChat() { 
            const chatID = [userData.id, currentFriend.id].sort().join('_');
            db.ref('chats/' + chatID).off();
            document.getElementById('chat-window').style.display = 'none'; 
            currentFriend = null;
            cancelEditMode(); 
        }
        function viewImg(src) { document.getElementById('lbImg').src = src; document.getElementById('lb').style.display = 'flex'; }
        
        function toggleTheme() {
            const b = document.body;
            b.setAttribute('data-theme', b.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
        }

        function renderFriends() {
            const container = document.getElementById('messages-list');
            container.innerHTML = myFriends.map(f => `
                <div class="msg-list-item" onclick="openChat('${f.id}')">
                    <div class="msg-avatar" style="background-image:url('${f.avatar || 'https://via.placeholder.com/100'}')"></div>
                    <div id="badge-${f.id}" class="unread-badge">0</div>
                    <div><div style="font-weight:bold;">${f.name}</div><div style="color:var(--inactive-color); font-size:0.8rem;">@${f.id}</div></div>
                </div>`).join('');
        }

        function loadProfile() {
            document.getElementById('pNameShow').innerText = userData.name;
            document.getElementById('pIdShow').innerText = "@" + userData.id;
            document.getElementById('pAvatar').style.backgroundImage = `url('${userData.avatar || 'https://via.placeholder.com/100'}')`;
            document.getElementById('pBanner').style.backgroundImage = `url('${userData.banner || 'https://via.placeholder.com/100'}')`;
            document.getElementById('eName').value = userData.name;
            document.getElementById('eId').value = userData.id;
            document.getElementById('eAvatarPrev').style.backgroundImage = `url('${userData.avatar || 'https://via.placeholder.com/100'}')`;
            document.getElementById('eBannerPrev').style.backgroundImage = `url('${userData.banner || 'https://via.placeholder.com/100'}')`;
        }

        function saveProfile() {
            const nId = document.getElementById('eId').value.trim();
            const nNm = document.getElementById('eName').value.trim();
            if(!nId || !nNm) return;
            if(nId !== userData.id) {
                db.ref('users/' + nId).once('value', snap => {
                    if(snap.exists()) {
                        document.getElementById('toastAlert').style.display='block';
                        setTimeout(()=>document.getElementById('toastAlert').style.display='none',2500);
                    } else {
                        db.ref('users/' + userData.id).remove();
                        userData.id = nId; userData.name = nNm; finishSave();
                    }
                });
            } else { userData.name = nNm; finishSave(); }
        }

        function finishSave() {
            localStorage.setItem('myStarsID', userData.id); localStorage.setItem('myName', userData.name);
            localStorage.setItem('myAv', userData.avatar); localStorage.setItem('myBan', userData.banner);
            syncWithFirebase(); loadProfile(); goPage('profile');
        }

        function prevImg(input, targetId) {
            const reader = new FileReader();
            reader.onload = e => {
                document.getElementById(targetId).style.backgroundImage = `url('${e.target.result}')`;
                if(targetId === 'eAvatarPrev') userData.avatar = e.target.result;
                if(targetId === 'eBannerPrev') userData.banner = e.target.result;
            };
            reader.readAsDataURL(input.files[0]);
        }

        function searchUserByInternalID() {
            const val = document.getElementById('addSearchInput').value.trim();
            const container = document.getElementById('search-result-container');
            if(!val) return container.innerHTML = "";
            db.ref('users/' + val).once('value', snap => {
                const u = snap.val();
                if(u) {
                    container.innerHTML = `<div style="margin:15px; padding:15px; background:var(--card-bg); border-radius:15px; display:flex; align-items:center; gap:12px; border:1px solid var(--border-color);">
                        <div class="msg-avatar" style="background-image:url('${u.avatar || 'https://via.placeholder.com/100'}')"></div>
                        <div style="flex:1;"><div style="font-weight:bold;">${u.name}</div><div>@${u.id}</div></div>
                        <button onclick="addFriend('${u.id}','${u.name}','${u.avatar}')" style="background:var(--accent-color); color:white; border:none; padding:8px 15px; border-radius:10px;">إضافة</button></div>`;
                } else container.innerHTML = '<p style="text-align:center; padding:20px;">غير موجود</p>';
            });
        }

        function addFriend(id, name, avatar) {
            if(id === userData.id) return;
            if(!myFriends.find(f => f.id === id)) {
                myFriends.push({id, name, avatar});
                localStorage.setItem('myFriendsList', JSON.stringify(myFriends));
                renderFriends(); goPage('messages');
            }
        }

        function smartSearch() {
            const v = document.getElementById('friendSearch').value.toLowerCase();
            document.querySelectorAll('.msg-list-item').forEach(i => {
                i.style.display = i.innerText.toLowerCase().includes(v) ? 'flex' : 'none';
            });
        }

        window.onload = init;
    </script>
</body>
</html>
