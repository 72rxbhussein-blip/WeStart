<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>تحدي التخمين - النسخة النهائية المتكاملة</title>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    
    <style>
        :root {
            --bg: #08080a;
            --purple: #bc6ff1;
            --surface: #16161d;
            --text: #e2e8f0;
            --dim: #64748b;
            --red: #ff4d4d;
            --green: #2ecc71;
            --gold: #f1c40f;
        }

        * {
            box-sizing: border-box;
            font-family: 'IBM Plex Sans Arabic', sans-serif;
            outline: none;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }
        
        body, html { 
            background: var(--bg); 
            color: var(--text); 
            margin: 0; 
            height: 100dvh; 
            width: 100%;
            overflow: hidden; 
            display: flex; 
            flex-direction: column; 
            position: fixed;
        }

        /* Views */
        .game-view { display: none; height: 100%; width: 100%; flex-direction: column; }
        .active-view { display: flex; }

        /* --- القائمة الرئيسية --- */
        #mainMenuView { 
            background: radial-gradient(circle at top right, #1a1a2e 0%, #08080a 100%); 
        }

        .top-bar { 
            width: 100%; 
            padding: 25px; 
            display: flex; 
            align-items: center; 
            justify-content: space-between;
            z-index: 10;
        }

        .user-info-trigger {
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            background: rgba(255,255,255,0.03);
            padding: 8px 15px;
            border-radius: 50px;
            border: 1px solid rgba(188, 111, 241, 0.1);
        }

        .my-avatar { 
            width: 50px; 
            height: 50px; 
            border-radius: 50%; 
            border: 2px solid var(--purple); 
            background: #222; 
            object-fit: cover; 
        }

        .level-mini-bar { 
            width: 80px; 
            height: 4px; 
            background: #2d2d35; 
            border-radius: 2px; 
            margin-top: 5px; 
            overflow: hidden; 
        }

        .level-progress-fill { 
            height: 100%; 
            background: linear-gradient(90deg, var(--purple), #8e44ad); 
            width: 0%; 
            transition: 1s ease-in-out; 
        }
        
        .main-hero { 
            flex: 1; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            text-align: center; 
            width: 100%; 
        }

        .game-logo { 
            font-size: 3.5rem; 
            font-weight: 800; 
            color: white; 
            margin-bottom: 5px; 
            text-shadow: 0 0 30px rgba(188, 111, 241, 0.4); 
            letter-spacing: -1px;
        }

        .game-tagline { 
            color: var(--dim); 
            font-size: 1.1rem; 
            margin-bottom: 60px; 
        }
        
        .menu-options { 
            width: 85%; 
            max-width: 360px; 
            display: flex; 
            flex-direction: column; 
            gap: 20px; 
        }

        .btn-main { 
            width: 100%; 
            padding: 20px; 
            border-radius: 22px; 
            border: none; 
            font-size: 1.2rem; 
            font-weight: 700; 
            cursor: pointer; 
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            gap: 12px; 
        }

        .btn-play { 
            background: var(--purple); 
            color: white; 
            box-shadow: 0 15px 35px rgba(188, 111, 241, 0.3); 
        }

        .btn-play:active { transform: scale(0.96); }

        .btn-secondary { 
            background: var(--surface); 
            color: white; 
            border: 1px solid rgba(255,255,255,0.05); 
        }

        /* --- شاشة البحث --- */
        #searchingOverlay { 
            position: fixed; 
            inset: 0; 
            background: #08080a; 
            z-index: 9999; 
            display: none; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
        }

        .vs-container { 
            display: flex; 
            align-items: center; 
            gap: 40px; 
            margin-bottom: 50px; 
        }

        .ludo-avatar { 
            width: 110px; 
            height: 110px; 
            border-radius: 30px; 
            border: 4px solid var(--purple); 
            object-fit: cover; 
            background: #222; 
        }

        .vs-circle {
            width: 60px;
            height: 60px;
            background: #ff4757;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            font-size: 1.5rem;
            box-shadow: 0 0 20px rgba(255, 71, 87, 0.4);
        }

        .pulse-ring { 
            position: absolute; 
            inset: -5px; 
            border: 4px solid var(--purple); 
            border-radius: 35px; 
            animation: pulse-anim 2s infinite; 
        }

        @keyframes pulse-anim { 0% { transform: scale(1); opacity: 1; } 100% { transform: scale(1.5); opacity: 0; } }

        /* --- واجهة اللعب --- */
        .game-header { 
            padding: 15px 20px; 
            display: flex; 
            align-items: center; 
            justify-content: space-between; 
            background: rgba(22, 22, 29, 0.8);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .arena { 
            flex-shrink: 0; 
            padding: 30px 10px; 
            display: flex; 
            justify-content: center; 
            gap: 20px; 
        }

        .card { 
            aspect-ratio: 3/4; 
            background: #1a1a20; 
            border-radius: 24px; 
            border: 2px solid #333; 
            overflow: hidden; 
            width: 155px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .card img { width: 100%; height: 100%; object-fit: cover; transition: 0.5s; }
        .blur-img { filter: blur(40px) brightness(0.4); }

        .chat-container { 
            flex: 1; 
            background: #111116; 
            margin: 0 15px; 
            border-radius: 30px 30px 0 0; 
            border: 1px solid rgba(188, 111, 241, 0.1); 
            display: flex; 
            flex-direction: column; 
            position: relative; 
            overflow: hidden;
        }

        .game-controls { 
            padding: 15px;
            display: flex; 
            align-items: center;
            gap: 12px; 
            background: rgba(255,255,255,0.02);
        }

        .voice-btn { 
            width: 42px; 
            height: 42px; 
            border-radius: 50%; 
            border: 1px solid #333; 
            background: #16161d; 
            color: white; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            cursor: pointer;
        }

        .correct-btn { 
            background: var(--green); 
            border-radius: 12px; 
            padding: 0 25px; 
            font-weight: 800; 
            color: white; 
            border: none; 
            height: 42px; 
            cursor: pointer; 
            box-shadow: 0 5px 15px rgba(46, 204, 113, 0.3);
            flex: 1;
        }

        .correct-btn:disabled { 
            background: #444; 
            opacity: 0.5; 
            box-shadow: none;
            cursor: not-allowed; 
        }

        .messages-area {
            flex: 1;
            padding: 15px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .input-bar { 
            padding: 15px 20px 35px; 
            background: #16161d; 
            display: flex; 
            gap: 12px; 
            border-top: 1px solid #2d2d35; 
        }

        .input-bar input { 
            flex: 1; 
            background: #2d2d35; 
            border: 1px solid #3d3d45; 
            padding: 14px 18px; 
            border-radius: 15px; 
            color: white; 
            font-size: 1rem;
        }

        .send-btn { 
            background: var(--purple); 
            border: none; 
            width: 50px; 
            height: 50px; 
            border-radius: 15px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            color: black; 
            cursor: pointer;
        }

        /* --- مودال الملف الشخصي الاحترافي --- */
        .modal-overlay { 
            display: none; 
            position: fixed; 
            inset: 0; 
            background: rgba(0,0,0,0.85); 
            z-index: 10000; 
            align-items: center; 
            justify-content: center; 
            backdrop-filter: blur(12px); 
        }

        .profile-card { 
            background: var(--surface); 
            width: 88%; 
            max-width: 350px; 
            border-radius: 35px; 
            padding: 40px 25px 30px; 
            text-align: center; 
            position: relative; 
            border: 1px solid rgba(255,255,255,0.1); 
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
        }

        .close-modal {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 35px;
            height: 35px;
            background: rgba(255,255,255,0.05);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .edit-trigger {
            position: absolute;
            top: 20px;
            left: 20px;
            cursor: pointer;
            color: var(--purple);
        }

        .profile-avatar-large { 
            width: 110px; 
            height: 110px; 
            border-radius: 50%; 
            border: 4px solid var(--purple); 
            margin: 0 auto 20px; 
            object-fit: cover; 
            display: block;
            box-shadow: 0 0 25px rgba(188, 111, 241, 0.3);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 25px;
        }

        .stat-box {
            background: rgba(255,255,255,0.03);
            padding: 15px;
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .stat-value { font-size: 1.4rem; font-weight: 800; color: var(--purple); display: block; }
        .stat-label { font-size: 0.75rem; color: var(--dim); text-transform: uppercase; letter-spacing: 1px; }

        /* --- شاشة الانتقال --- */
        #roundTransition { 
            display: none; 
            position: fixed; 
            inset: 0; 
            z-index: 99999; 
            background: rgba(8, 8, 10, 0.98); 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
        }

        .trans-layer {
            width: 120%;
            height: 70px;
            background: #16161d;
            margin: 8px 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            font-size: 1.4rem;
            transform: rotate(-3deg);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .trans-round { background: var(--purple); color: black; z-index: 2; transform: rotate(3deg); }
    </style>
</head>
<body>

    <div id="mainMenuView" class="game-view active-view">
        <div class="top-bar">
            <div class="user-info-trigger" onclick="openProfile()">
                <img id="headerAvatar" src="" class="my-avatar">
                <div style="margin-right: 10px;">
                    <div id="headerName" style="font-weight: 700; font-size: 1rem;">جاري التحميل...</div>
                    <div class="level-mini-bar"><div id="miniProgress" class="level-progress-fill"></div></div>
                </div>
            </div>
            <div style="color: var(--gold); font-weight: 800; font-size: 1.1rem;">Coins: 1250</div>
        </div>

        <div class="main-hero">
            <div class="game-logo">تحدي التخمين</div>
            <div class="game-tagline">أثبت أنك الأسرع في التخمين!</div>
            
            <div class="menu-options">
                <button class="btn-main btn-play" onclick="startLudoSearch()">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
                    دخول التحدي
                </button>
                <button class="btn-main btn-secondary" onclick="openProfile()">
                    الملف الشخصي
                </button>
                <button class="btn-main btn-secondary">
                    المتجر العالمي
                </button>
            </div>
        </div>
    </div>

    <div id="searchingOverlay">
        <div class="vs-container">
            <div style="text-align: center; position: relative;">
                <div class="pulse-ring"></div>
                <img id="mySearchAvatar" src="" class="ludo-avatar">
                <div id="mySearchName" style="margin-top:15px; font-weight:700; color: white;">أنت</div>
            </div>
            
            <div class="vs-circle">VS</div>
            
            <div style="text-align: center;">
                <div id="oppSearchRing" class=""></div>
                <img id="oppAvatarSearch" src="https://api.dicebear.com/7.x/avataaars/svg?seed=bot" class="ludo-avatar" style="border-color: #555;">
                <div id="oppNameSearch" style="margin-top:15px; font-weight:700; color: #555;">بحث...</div>
            </div>
        </div>
        <div style="color: var(--purple); font-weight: 600; letter-spacing: 2px;" id="searchStatus">جارِ العثور على منافس...</div>
        <button class="btn-main btn-secondary" style="width:180px; margin-top:40px; padding:12px; font-size:1rem;" onclick="stopSearch()">إلغاء البحث</button>
    </div>

    <div id="gamePlayView" class="game-view">
        <div id="roundTransition">
            <div class="trans-layer" id="transOppScore">الخصم : 0</div>
            <div class="trans-layer trans-round" id="transRoundLabel">الجولة 1</div>
            <div class="trans-layer" id="transMyScore">أنت : 0</div>
        </div>

        <div class="game-header">
            <div style="display: flex; align-items: center; gap: 12px;">
                <div style="width:45px; height:45px; border-radius:12px; border:2px solid var(--purple); overflow:hidden;">
                    <img id="gameOppAvatar" src="" style="width:100%; height:100%; object-fit:cover;">
                </div>
                <div>
                    <div id="gameOppName" style="font-weight:700; font-size:0.9rem;">الخصم</div>
                    <div id="gameOppXP" style="font-size:0.7rem; color: var(--purple); font-weight:bold;">XP: 0</div>
                </div>
            </div>
            <div id="roundIndicator" style="background:var(--purple); color:black; padding:4px 15px; border-radius:50px; font-weight:900; font-size:0.8rem;">1 / 3</div>
        </div>

        <div class="arena">
            <div class="card"><img class="blur-img" id="oppCardImg" src=""></div>
            <div class="card" style="border-color: var(--purple);"><img id="myCardImg" src=""></div>
        </div>

        <div class="chat-container">
            <div class="game-controls">
                <button id="correctBtn" class="correct-btn" onclick="handleCorrectClick()">صحيح</button>
                <button class="voice-btn">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"></path><path d="M19 10v2a7 7 0 0 1-14 0v-2"></path><line x1="12" y1="19" x2="12" y2="23"></line></svg>
                </button>
                <button class="voice-btn">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><path d="M19.07 4.93a10 10 0 0 1 0 14.14"></path></svg>
                </button>
            </div>
            <div id="chatMessages" class="messages-area"></div>
        </div>

        <div class="input-bar">
            <input type="text" id="chatInput" placeholder="أدخل تخمينك هنا...">
            <button class="send-btn" onclick="sendChatMessage()">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
            </button>
        </div>
    </div>

    <div id="profileModal" class="modal-overlay">
        <div class="profile-card">
            <div class="close-modal" onclick="closeAllModals()">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
            </div>
            <div class="edit-trigger" onclick="openEditProfile()">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>
            </div>
            
            <img id="modalAvatar" src="" class="profile-avatar-large">
            <h2 id="modalName" style="margin: 0; font-size: 1.6rem;">لاعب</h2>
            <p id="modalLevelLabel" style="color: var(--purple); font-weight: 700; margin: 5px 0 20px;">المستوى 1</p>
            
            <div class="level-mini-bar" style="width: 100%; height: 10px; border-radius: 10px;">
                <div id="modalProgress" class="level-progress-fill"></div>
            </div>

            <div class="stats-grid">
                <div class="stat-box">
                    <span id="statWins" class="stat-value">0</span>
                    <span class="stat-label">فوز</span>
                </div>
                <div class="stat-box">
                    <span id="statXP" class="stat-value">0</span>
                    <span class="stat-label">خبرة XP</span>
                </div>
            </div>

            <button class="btn-main btn-play" style="margin-top: 30px; padding: 15px;" onclick="closeAllModals()">إغلاق</button>
        </div>
    </div>

    <div id="editModal" class="modal-overlay">
        <div class="profile-card">
            <h3 style="margin-bottom: 25px;">تعديل البيانات</h3>
            <div style="position: relative; width: 110px; margin: 0 auto 25px;">
                <img id="editPreviewAvatar" src="" class="profile-avatar-large" style="opacity: 0.5;">
                <input type="file" accept="image/*" onchange="handleImageUpload(event)" style="position: absolute; inset: 0; opacity: 0; cursor: pointer;">
                <div style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); pointer-events: none; font-size: 0.8rem; font-weight: 700;">تغيير</div>
            </div>
            
            <input type="text" id="editNameInput" placeholder="اكتب اسمك الجديد" style="width: 100%; padding: 15px; background: #08080a; border: 1px solid #333; color: white; border-radius: 15px; text-align: center; margin-bottom: 20px; font-size: 1.1rem;">
            
            <button class="btn-main btn-play" onclick="saveProfileChanges()">حفظ التعديلات</button>
            <button class="btn-main btn-secondary" style="margin-top: 10px; padding: 12px; font-size: 1rem;" onclick="closeAllModals()">إلغاء</button>
        </div>
    </div>

    <div id="resultsModal" class="modal-overlay">
        <div class="profile-card" style="border-top: 5px solid var(--purple);">
            <h1 id="finalTitle" style="font-size: 2rem;">انتهى التحدي!</h1>
            <div style="margin: 30px 0;">
                <div style="display: flex; justify-content: space-between; margin-bottom: 15px; font-size: 1.2rem;">
                    <span>نقاطك:</span>
                    <span id="resMyScore" style="color: var(--purple); font-weight: 800;">0</span>
                </div>
                <div style="display: flex; justify-content: space-between; font-size: 1.2rem;">
                    <span>نقاط الخصم:</span>
                    <span id="resOppScore" style="color: var(--red); font-weight: 800;">0</span>
                </div>
            </div>
            <button class="btn-main btn-play" onclick="location.reload()">العودة للرئيسية</button>
        </div>
    </div>

    <script>
        // --- تهيئة Firebase ---
        const firebaseConfig = { databaseURL: "https://westarts-75dd6-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // --- إدارة الهوية والبيانات ---
        let myID = localStorage.getItem('guessGameID') || "u" + Date.now();
        localStorage.setItem('guessGameID', myID);

        let userData = JSON.parse(localStorage.getItem('guessGameUser')) || {
            name: "لاعب جديد",
            avatar: `https://api.dicebear.com/7.x/avataaars/svg?seed=${myID}`,
            xp: 0,
            wins: 0
        };

        let currentRoom = null, isHost = false, currentRound = 1;
        let myPoints = 0, oppPoints = 0, foundOpp = null, canClick = true;

        function updateGlobalUI() {
            const level = Math.floor(userData.xp / 500) + 1;
            const progress = ((userData.xp % 500) / 500) * 100;

            document.getElementById('headerName').innerText = userData.name;
            document.getElementById('modalName').innerText = userData.name;
            document.getElementById('modalLevelLabel').innerText = "المستوى " + level;
            document.getElementById('miniProgress').style.width = progress + "%";
            document.getElementById('modalProgress').style.width = progress + "%";
            document.getElementById('statWins').innerText = userData.wins;
            document.getElementById('statXP').innerText = userData.xp;
            
            const imgs = ['headerAvatar', 'modalAvatar', 'mySearchAvatar', 'editPreviewAvatar'];
            imgs.forEach(id => document.getElementById(id).src = userData.avatar);
            document.getElementById('mySearchName').innerText = userData.name;
            document.getElementById('editNameInput').value = userData.name;
        }

        // --- إدارة الملف الشخصي ---
        function handleImageUpload(e) {
            const file = e.target.files[0];
            if(file) {
                const reader = new FileReader();
                reader.onload = (event) => {
                    userData.avatar = event.target.result;
                    document.getElementById('editPreviewAvatar').src = event.target.result;
                };
                reader.readAsDataURL(file);
            }
        }

        function saveProfileChanges() {
            const newName = document.getElementById('editNameInput').value.trim();
            if(newName) userData.name = newName;
            localStorage.setItem('guessGameUser', JSON.stringify(userData));
            updateGlobalUI();
            closeAllModals();
        }

        // --- نظام البحث والمباراة ---
        function startLudoSearch() {
            document.getElementById('searchingOverlay').style.display = 'flex';
            const matchRef = db.ref('matchmaking');

            matchRef.once('value').then(snap => {
                let peerFound = false;
                snap.forEach(child => {
                    if(child.key !== myID && !peerFound) {
                        peerFound = true;
                        isHost = false;
                        const roomID = "room_" + Math.min(myID, child.key) + "_" + Math.max(myID, child.key);
                        currentRoom = roomID;
                        foundOpp = { ...child.val(), id: child.key };

                        db.ref('rooms/' + roomID).set({
                            players: { [myID]: userData, [child.key]: foundOpp },
                            scores: { [myID]: 0, [child.key]: 0 },
                            readyHandshake: { [myID]: true },
                            round: 1, lastAction: ""
                        }).then(() => {
                            matchRef.child(child.key).remove();
                            waitForHandshake();
                        });
                    }
                });

                if(!peerFound) {
                    isHost = true;
                    matchRef.child(myID).set(userData);
                    db.ref('rooms').on('child_added', s => {
                        if(s.key.includes(myID)) {
                            currentRoom = s.key;
                            db.ref('rooms/' + currentRoom + '/players').once('value', ps => {
                                const pData = ps.val();
                                const oID = Object.keys(pData).find(id => id !== myID);
                                foundOpp = { ...pData[oID], id: oID };
                                db.ref('rooms/' + currentRoom + '/readyHandshake/' + myID).set(true);
                                matchRef.child(myID).remove();
                                db.ref('rooms').off('child_added');
                                waitForHandshake();
                            });
                        }
                    });
                }
            });
        }

        function waitForHandshake() {
            db.ref('rooms/' + currentRoom + '/readyHandshake').on('value', snap => {
                if(snap.numChildren() === 2) {
                    db.ref('rooms/' + currentRoom + '/readyHandshake').off();
                    launchGame();
                }
            });
        }

        function launchGame() {
            document.getElementById('searchingOverlay').style.display = 'none';
            document.getElementById('mainMenuView').classList.remove('active-view');
            document.getElementById('gamePlayView').classList.add('active-view');
            
            document.getElementById('gameOppName').innerText = foundOpp.name;
            document.getElementById('gameOppAvatar').src = foundOpp.avatar;
            document.getElementById('gameOppXP').innerText = "XP: " + (foundOpp.xp || 0);

            listenToRoomUpdates();
            if(isHost) refreshImages();
            showTransition(1);
        }

        function refreshImages() {
            db.ref('bank_images').once('value').then(snap => {
                let pool = []; snap.forEach(c => pool.push(c.val().url));
                if(pool.length >= 2) {
                    let r1 = Math.floor(Math.random() * pool.length);
                    let r2; do { r2 = Math.floor(Math.random() * pool.length); } while(r1 === r2);
                    db.ref('rooms/' + currentRoom + '/imgs').set({ 
                        [myID]: pool[r1], 
                        [foundOpp.id]: pool[r2],
                        trigger: Date.now() 
                    });
                }
            });
        }

        function listenToRoomUpdates() {
            db.ref('rooms/' + currentRoom).on('value', snap => {
                const data = snap.val(); if(!data) return;
                
                myPoints = data.scores[myID] || 0;
                oppPoints = data.scores[foundOpp.id] || 0;

                if(data.imgs) {
                    const oldImg = document.getElementById('myCardImg').src;
                    document.getElementById('myCardImg').src = data.imgs[myID];
                    document.getElementById('oppCardImg').src = data.imgs[foundOpp.id];

                    // إعادة تفعيل زر "صحيح" فقط عند تغير الصورة (جولة جديدة)
                    if(oldImg !== data.imgs[myID]) {
                        canClick = true;
                        document.getElementById('correctBtn').disabled = false;
                        document.getElementById('oppCardImg').classList.add('blur-img');
                    }
                }

                // مراقبة إذا الخصم ضغط صحيح
                if(data.lastAction === "win_" + foundOpp.id) {
                    document.getElementById('oppCardImg').classList.remove('blur-img');
                    canClick = false;
                    document.getElementById('correctBtn').disabled = true;
                    setTimeout(() => moveNext(), 2500);
                }
            });

            db.ref('chats/' + currentRoom).on('child_added', s => {
                if(s.val().sender !== myID) renderMessage(s.val().text, 'opp');
            });
        }

        // --- إصلاح النقاط المباشر ---
        function handleCorrectClick() {
            if(!canClick) return;
            canClick = false;
            document.getElementById('correctBtn').disabled = true;
            document.getElementById('oppCardImg').classList.remove('blur-img');

            // إرسال النقاط لك (myID) حصراً في قاعدة البيانات
            db.ref('rooms/' + currentRoom + '/scores/' + myID).set(myPoints + 100);
            db.ref('rooms/' + currentRoom + '/lastAction').set("win_" + myID);

            setTimeout(() => {
                db.ref('rooms/' + currentRoom + '/lastAction').set("");
                moveNext();
            }, 2500);
        }

        function moveNext() {
            if(currentRound < 3) {
                currentRound++;
                showTransition(currentRound, false, () => {
                    if(isHost) refreshImages();
                });
            } else {
                finishMatch();
            }
        }

        function finishMatch() {
            showTransition(3, true, () => {
                document.getElementById('resMyScore').innerText = myPoints;
                document.getElementById('resOppScore').innerText = oppPoints;
                
                userData.xp += (myPoints / 2);
                if(myPoints > oppPoints) {
                    userData.wins += 1;
                    document.getElementById('finalTitle').innerText = "لقد سحقت الخصم! 🏆";
                } else {
                    document.getElementById('finalTitle').innerText = "هارد لك، حاول ثانية!";
                }
                
                localStorage.setItem('guessGameUser', JSON.stringify(userData));
                updateGlobalUI();
                document.getElementById('resultsModal').style.display = 'flex';
                if(isHost) db.ref('rooms/' + currentRoom).remove();
            });
        }

        function showTransition(r, isFinal=false, callback) {
            const overlay = document.getElementById('roundTransition');
            document.getElementById('transOppScore').innerText = `${foundOpp.name} : ${oppPoints}`;
            document.getElementById('transMyScore').innerText = `أنت : ${myPoints}`;
            document.getElementById('transRoundLabel').innerText = isFinal ? "النتيجة النهائية" : `الجولة رقم ${r}`;
            
            if(!isFinal) document.getElementById('roundIndicator').innerText = `${r} / 3`;

            overlay.style.display = 'flex';
            setTimeout(() => {
                overlay.style.display = 'none';
                if(callback) callback();
            }, 3500);
        }

        // --- المحادثة ---
        function sendChatMessage() {
            const input = document.getElementById('chatInput');
            const txt = input.value.trim();
            if(!txt) return;

            db.ref('chats/' + currentRoom).push({ sender: myID, text: txt });
            renderMessage(txt, 'me');
            input.value = "";
        }

        function renderMessage(text, side) {
            const box = document.getElementById('chatMessages');
            const div = document.createElement('div');
            div.style = `
                max-width: 80%;
                padding: 12px 18px;
                border-radius: 20px;
                font-size: 0.95rem;
                margin-bottom: 5px;
                line-height: 1.4;
                align-self: ${side === 'me' ? 'flex-start' : 'flex-end'};
                background: ${side === 'me' ? 'var(--purple)' : '#333'};
                color: ${side === 'me' ? 'black' : 'white'};
                font-weight: ${side === 'me' ? '600' : '400'};
            `;
            div.innerText = text;
            box.appendChild(div);
            box.scrollTop = box.scrollHeight;
        }

        // --- إدارة النوافذ ---
        function openProfile() { document.getElementById('profileModal').style.display = 'flex'; }
        function openEditProfile() { 
            document.getElementById('profileModal').style.display = 'none'; 
            document.getElementById('editModal').style.display = 'flex'; 
        }
        function closeAllModals() { 
            document.querySelectorAll('.modal-overlay').forEach(m => m.style.display = 'none'); 
        }
        function stopSearch() {
            db.ref('matchmaking/' + myID).remove();
            location.reload();
        }

        window.onload = updateGlobalUI;
    </script>
</body>
</html>
